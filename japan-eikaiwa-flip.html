<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Must-Visit Places in Japan 瞬間英作文</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --bg: #f7f3ee;
  --card: #ffffff;
  --text: #2c2a26;
  --text-sub: #6b6860;
  --text-hint: #9c9a94;
  --red: #c0392b;
  --red-light: #fdf0ee;
  --red-mid: #e05a4a;
  --gold: #c9860a;
  --gold-light: #fdf6e3;
  --green: #2e7d52;
  --green-light: #eaf5ee;
  --green-mid: #4aab78;
  --blue: #1a5f8a;
  --blue-light: #e6f2fb;
  --border: #e4dfd8;
  --radius: 20px;
  --radius-sm: 10px;
  --shadow: 0 4px 20px rgba(0,0,0,0.09);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.13);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 10px;
  position: sticky; top: 0; z-index: 100;
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.app-title {
  font-family: 'Nunito', sans-serif;
  font-size: 18px; font-weight: 800;
  color: var(--red);
  display: flex; align-items: center; gap: 6px;
}

.stats-row { display: flex; gap: 14px; align-items: center; }
.stat-item { text-align: center; }
.stat-n { font-size: 17px; font-weight: 700; font-family: 'Nunito', sans-serif; line-height: 1; }
.stat-l { font-size: 10px; color: var(--text-hint); margin-top: 1px; }

.nav-tabs { display: flex; gap: 3px; }
.nav-tab {
  flex: 1; padding: 7px 4px;
  border: none; border-radius: 8px;
  background: transparent;
  font-size: 12px; font-weight: 500;
  color: var(--text-sub); cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 3px;
}
.nav-tab.active { background: var(--red-light); color: var(--red); font-weight: 700; }
.nav-tab .rbadge {
  background: var(--red-mid); color: #fff;
  border-radius: 10px; padding: 1px 6px;
  font-size: 10px; font-weight: 700;
}

/* ── Progress ── */
.progress-outer { padding: 8px 20px 0; max-width: 600px; margin: 0 auto; width: 100%; }
.progress-wrap {
  height: 5px; background: var(--border);
  border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red-mid), var(--red));
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

/* ── Content ── */
.content { flex: 1; padding: 16px 16px 100px; max-width: 600px; margin: 0 auto; width: 100%; }

/* ── Cat filter ── */
.cat-scroll {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 4px; margin-bottom: 16px;
  scrollbar-width: none;
}
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-btn {
  white-space: nowrap; padding: 5px 13px;
  border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--card); font-size: 12px; font-weight: 500;
  color: var(--text-sub); cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.12s;
}
.cat-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

/* ── FLIP CARD ── */
.flip-scene { width: 100%; perspective: 1200px; margin-bottom: 18px; }

.flip-card {
  width: 100%; min-height: 290px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}
.flip-card.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute; inset: 0;
  border-radius: var(--radius);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px 24px;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
}

.card-front { background: var(--card); }
.card-front .face-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: var(--text-hint);
  margin-bottom: 16px;
  background: var(--bg); padding: 4px 12px; border-radius: 20px;
}
.card-front .ja-text {
  font-size: 21px; font-weight: 700;
  line-height: 1.65; text-align: center;
  color: var(--text); margin-bottom: 18px;
}
.card-front .hint-row {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
}
.hint-chip {
  background: var(--blue-light); color: var(--blue);
  font-size: 12px; font-weight: 600;
  padding: 4px 12px; border-radius: 6px;
  font-family: 'Nunito', sans-serif;
}
.card-front .tap-hint {
  margin-top: 22px; font-size: 12px; color: var(--text-hint);
  display: flex; align-items: center; gap: 5px;
}
.tap-icon { font-size: 16px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.5;transform:scale(0.9)}
}

.card-back {
  background: linear-gradient(135deg, #c0392b 0%, #e05a4a 100%);
  transform: rotateY(180deg);
}
.card-back .face-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 16px;
  background: rgba(255,255,255,0.15); padding: 4px 12px; border-radius: 20px;
}
.card-back .en-text {
  font-family: 'Nunito', sans-serif;
  font-size: 21px; font-weight: 700;
  line-height: 1.6; text-align: center;
  color: #fff; margin-bottom: 10px;
}
.card-back .alt-text {
  font-size: 13px; color: rgba(255,255,255,0.72);
  text-align: center; line-height: 1.6; margin-bottom: 10px;
}
.card-back .key-tag {
  background: rgba(255,255,255,0.2); color: #fff;
  font-size: 12px; font-weight: 600;
  padding: 5px 14px; border-radius: 20px;
  font-family: 'Nunito', sans-serif; margin-bottom: 8px;
}
.card-back .info-text {
  font-size: 12px; color: rgba(255,255,255,0.65);
  text-align: center; line-height: 1.6; padding: 0 8px;
}

/* ── Judge buttons ── */
.judge-buttons {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-top: 4px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s 0.3s;
}
.judge-buttons.visible { opacity: 1; pointer-events: all; }

.btn-judge {
  padding: 16px 12px; border-radius: var(--radius-sm);
  border: none; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.btn-judge:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.15); }
.btn-judge:active { transform: scale(0.97); }
.btn-ng { background: var(--red-light); color: var(--red); border: 2px solid #f5c6c0; }
.btn-ng:hover { background: var(--red); color: #fff; border-color: var(--red); }
.btn-ok { background: var(--green-light); color: var(--green); border: 2px solid #b8dfc8; }
.btn-ok:hover { background: var(--green); color: #fff; border-color: var(--green); }
.btn-judge .btn-icon { font-size: 24px; }
.btn-judge .btn-lbl { font-size: 13px; }
.btn-judge .btn-sub { font-size: 10px; opacity: 0.7; }

.card-counter {
  text-align: center; margin-bottom: 12px;
  font-size: 13px; color: var(--text-hint);
  font-family: 'Nunito', sans-serif; font-weight: 600;
}

/* ── Result ── */
.result-screen {
  background: var(--card); border-radius: var(--radius);
  padding: 36px 24px; text-align: center;
  box-shadow: var(--shadow-lg); border: 1px solid var(--border);
}
.result-emoji { font-size: 52px; margin-bottom: 10px; }
.result-pct { font-size: 68px; font-weight: 800; font-family: 'Nunito', sans-serif; color: var(--red); line-height: 1; margin-bottom: 8px; }
.result-msg { font-size: 16px; color: var(--text-sub); margin-bottom: 28px; }
.result-nums { display: flex; justify-content: center; gap: 40px; margin-bottom: 28px; }
.r-num { font-size: 32px; font-weight: 800; font-family: 'Nunito', sans-serif; }
.r-num.ok { color: var(--green); }
.r-num.ng { color: var(--red); }
.r-lbl { font-size: 12px; color: var(--text-hint); margin-top: 2px; }
.result-btns { display: flex; flex-direction: column; gap: 10px; }
.btn-result {
  width: 100%; padding: 14px; border-radius: var(--radius-sm);
  border: 2px solid var(--border); font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  background: var(--card); color: var(--text); transition: all 0.13s;
}
.btn-result:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.btn-result.primary { background: var(--red); color: #fff; border-color: var(--red); }
.btn-result.amber { border-color: var(--gold); color: var(--gold); }

/* ── Vocab ── */
.vocab-card {
  background: var(--card); border-radius: var(--radius);
  padding: 18px; margin-bottom: 10px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
}
.vocab-phrase { font-size: 17px; font-weight: 700; color: var(--red); font-family: 'Nunito', sans-serif; margin-bottom: 4px; }
.vocab-cat { font-size: 11px; color: var(--text-hint); margin-bottom: 6px; }
.vocab-meaning { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
.vocab-examples { display: flex; flex-direction: column; gap: 6px; }
.ex-item { background: var(--red-light); border-radius: 8px; padding: 10px 12px; }
.ex-en { font-size: 14px; font-weight: 600; color: var(--red); font-family: 'Nunito', sans-serif; line-height: 1.5; }
.ex-ja { font-size: 12px; color: var(--text-sub); margin-top: 3px; line-height: 1.5; }

/* ── Review ── */
.review-item {
  background: var(--card); border-radius: var(--radius);
  padding: 16px 18px; margin-bottom: 10px;
  border-left: 4px solid var(--gold);
  box-shadow: var(--shadow);
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.ri-ja { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
.ri-en { font-size: 14px; font-weight: 600; color: var(--text-sub); font-family: 'Nunito', sans-serif; line-height: 1.5; margin-bottom: 6px; }
.ri-key { font-size: 12px; background: var(--gold-light); color: var(--gold); padding: 3px 8px; border-radius: 6px; display: inline-block; font-weight: 600; font-family: 'Nunito', sans-serif; }
.ri-actions { display: flex; gap: 6px; margin-top: 10px; }
.btn-sm { padding: 6px 14px; border-radius: 8px; border: 1.5px solid; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.12s; }
.btn-sm.green { border-color: var(--green); background: var(--green-light); color: var(--green); }
.btn-sm.green:hover { background: var(--green); color: #fff; }
.btn-sm.gray { border-color: var(--border); background: var(--bg); color: var(--text-sub); }

.empty-state { text-align: center; padding: 56px 20px; color: var(--text-hint); }
.empty-state .ee { font-size: 44px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; line-height: 1.8; }

@media(max-width:400px){
  .card-front .ja-text{font-size:18px}
  .card-back .en-text{font-size:18px}
  .result-pct{font-size:52px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="app-title">🗾 Japan スピーキング</div>
    <div class="stats-row">
      <div class="stat-item"><div class="stat-n" id="s-total" style="color:var(--text)">0</div><div class="stat-l">合計</div></div>
      <div class="stat-item"><div class="stat-n" id="s-ok" style="color:var(--green)">0</div><div class="stat-l">できた</div></div>
      <div class="stat-item"><div class="stat-n" id="s-ng" style="color:var(--red)">0</div><div class="stat-l">復習</div></div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-practice" onclick="switchMode('practice')">🗣️ 練習</button>
    <button class="nav-tab" id="tab-vocab" onclick="switchMode('vocab')">📖 単語帳</button>
    <button class="nav-tab" id="tab-review" onclick="switchMode('review')">🔁 要復習<span class="rbadge" id="rbadge" style="display:none">0</span></button>
  </div>
</header>

<div class="progress-outer">
  <div class="progress-wrap"><div class="progress-fill" id="prog" style="width:0%"></div></div>
</div>

<div class="content">
  <div id="mode-practice">
    <div class="cat-scroll" id="cat-row"></div>
    <div class="card-counter" id="card-counter"></div>
    <div class="flip-scene">
      <div class="flip-card" id="flip-card" onclick="flipCard()">
        <div class="card-face card-front" id="card-front">
          <div class="face-label">日本語を見て英語で言おう</div>
          <div class="ja-text" id="ja-text"></div>
          <div class="hint-row" id="hint-row"></div>
          <div class="tap-hint"><span class="tap-icon">👆</span> タップで英語を確認</div>
        </div>
        <div class="card-face card-back">
          <div class="face-label">Answer</div>
          <div class="en-text" id="en-text"></div>
          <div class="alt-text" id="alt-text"></div>
          <div class="key-tag" id="key-tag"></div>
          <div class="info-text" id="info-text"></div>
        </div>
      </div>
    </div>
    <div class="judge-buttons" id="judge-buttons">
      <button class="btn-judge btn-ng" onclick="judge(false)">
        <span class="btn-icon">😅</span><span class="btn-lbl">できなかった</span><span class="btn-sub">要復習に追加</span>
      </button>
      <button class="btn-judge btn-ok" onclick="judge(true)">
        <span class="btn-icon">✅</span><span class="btn-lbl">できた！</span><span class="btn-sub">次へ進む</span>
      </button>
    </div>
  </div>

  <div id="mode-vocab" style="display:none"><div id="vocab-list"></div></div>
  <div id="mode-review" style="display:none"><div id="review-list"></div></div>
</div>

<script>
const VOCAB = [
  {
    phrase: "you've gotta check out",
    meaning: "絶対に〜を見てみて / ぜひ〜に行くべき",
    category: "おすすめ表現",
    examples: [
      { en: "You've gotta check out Kyoto if you visit Japan.", ja: "日本に来たら京都は絶対に行くべきだよ。" },
      { en: "You've gotta check out this new restaurant downtown.", ja: "街のあの新しいレストラン、絶対に行ってみて。" },
      { en: "You've gotta check out this documentary — it's amazing.", ja: "このドキュメンタリー絶対に見て、すごいから。" },
      { en: "You've gotta check out the view from the top floor.", ja: "最上階からの眺めは絶対に見てみて。" },
      { en: "If you're into art, you've gotta check out that gallery.", ja: "アートが好きなら、あのギャラリーは絶対見てほしい。" },
      { en: "You've gotta check out their summer menu — it's incredible.", ja: "夏のメニューは絶対チェックして、信じられないくらいおいしい。" },
      { en: "You've gotta check out this app — it'll change your life.", ja: "このアプリ絶対チェックして、生活が変わるから。" },
      { en: "Before you leave, you've gotta check out the local market.", ja: "帰る前に地元の市場は絶対のぞいてみて。" },
      { en: "You've gotta check out their website for more details.", ja: "詳しくはウェブサイトを絶対チェックして。" },
      { en: "You've gotta check out this book — I couldn't put it down.", ja: "この本絶対読んで、手が止まらなかったから。" }
    ]
  },
  {
    phrase: "totally different vibes",
    meaning: "全く違う雰囲気・空気感",
    category: "描写・比較",
    examples: [
      { en: "Kyoto and Osaka have totally different vibes.", ja: "京都と大阪は全く違う雰囲気を持っている。" },
      { en: "The two cafés are close by but have totally different vibes.", ja: "2つのカフェは近くにあるけど、雰囲気が全然違う。" },
      { en: "Day and night, this place has totally different vibes.", ja: "昼と夜では、この場所は全く違う雰囲気がある。" },
      { en: "The first half and second half of the movie have totally different vibes.", ja: "映画の前半と後半では全く違う雰囲気がある。" },
      { en: "Their new album has totally different vibes from the last one.", ja: "彼らの新しいアルバムは前のとは全然違う雰囲気だ。" },
      { en: "Summer and winter here have totally different vibes.", ja: "ここの夏と冬は全く違う雰囲気がある。" },

      { en: "These two neighborhoods have totally different vibes.", ja: "この二つの地域は全く違う雰囲気だ。" },
      { en: "The upstairs and downstairs areas have totally different vibes.", ja: "上の階と下の階では全然雰囲気が違う。" },
      { en: "Their old and new offices have totally different vibes.", ja: "昔と今のオフィスは全く雰囲気が違う。" }
    ]
  },
  {
    phrase: "is all about",
    meaning: "〜が全てだ / 〜に尽きる / 〜が魅力の中心",
    category: "強調表現",
    examples: [
      { en: "Kyoto is all about the scenery and traditional buildings.", ja: "京都は景色と伝統的な建物に尽きる。" },
      { en: "This restaurant is all about fresh, local ingredients.", ja: "このレストランは新鮮な地元食材が全てだ。" },
      { en: "For me, travel is all about meeting new people.", ja: "私にとって旅行は新しい人と出会うことが全てだ。" },
      { en: "Spring in Japan is all about the cherry blossoms.", ja: "日本の春は桜に尽きる。" },
      { en: "Their brand is all about sustainability.", ja: "彼らのブランドは持続可能性が全てだ。" },
      { en: "The new policy is all about cutting costs.", ja: "新しい方針はコスト削減が全てだ。" },
      { en: "His cooking style is all about simplicity.", ja: "彼の料理スタイルはシンプルさが全てだ。" },
      { en: "This workout is all about building core strength.", ja: "このトレーニングはコアの筋肉を鍛えることが全てだ。" },
      { en: "The festival is all about celebrating local culture.", ja: "そのフェスティバルは地元文化を祝うことが全てだ。" },
      { en: "Being a good leader is all about listening.", ja: "優れたリーダーであることは聞くことに尽きる。" }

  },
  {
    phrase: "absolutely unmissable",
    meaning: "絶対に見逃せない / 必見の",
    category: "おすすめ表現",
    examples: [
      { en: "Kinkaku-ji is absolutely unmissable when in Kyoto.", ja: "京都では金閣寺は絶対に見逃せない。" },
      { en: "The sunset from this point is absolutely unmissable.", ja: "この場所からの夕日は絶対に見逃せない。" },
      { en: "Their spring collection is absolutely unmissable.", ja: "彼らの春のコレクションは絶対に見逃せない。" },
      { en: "This documentary is absolutely unmissable for history lovers.", ja: "このドキュメンタリーは歴史好きには絶対に見逃せない。" },
      { en: "The final episode is absolutely unmissable.", ja: "最終回は絶対に見逃せない。" },
      { en: "For coffee fans, this café is absolutely unmissable.", ja: "コーヒー好きにとって、このカフェは絶対に見逃せない。" },
      { en: "The opening ceremony was absolutely unmissable.", ja: "開会式は絶対に見逃せなかった。" },

      { en: "That sale was absolutely unmissable — everything was 70% off.", ja: "あのセールは絶対に見逃せなかった、全品70%オフだったから。" }

  },
  {
    phrase: "gorgeous",
    meaning: "とても美しい / 豪華な / 素晴らしい",
    category: "描写・感嘆",
    examples: [
      { en: "The garden around Kinkaku-ji is gorgeous.", ja: "金閣寺周辺の庭園はとても美しい。" },
      { en: "What a gorgeous sunset!", ja: "なんて美しい夕日なんだろう！" },
      { en: "She wore a gorgeous dress to the party.", ja: "彼女はパーティーに豪華なドレスを着ていった。" },
      { en: "The view from the mountain top was absolutely gorgeous.", ja: "山頂からの景色は本当に素晴らしかった。" },
      { en: "The cherry blossoms in full bloom are gorgeous.", ja: "満開の桜はとても美しい。" },
      { en: "They have a gorgeous new office in the city center.", ja: "彼らは市内中心部にとても素敵な新しいオフィスを持っている。" },

const CATEGORIES = ["全て","おすすめ表現","描写・比較","強調表現","描写・感嘆","切り替え・転換","まとめ・強調"];

const S = {
  mode:"practice", cat:"全て", qs:[], idx:0, flipped:false,
  wrong:[], correct:0, total:0
};

function shuffle(a){let arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function updateStats(){
  document.getElementById("s-total").textContent=S.total;
  document.getElementById("s-ok").textContent=S.correct;
  document.getElementById("s-ng").textContent=S.wrong.length;
  const b=document.getElementById("rbadge");
  if(S.wrong.length>0){b.style.display="";b.textContent=S.wrong.length;}
  else b.style.display="none";
}

function switchMode(m){
  S.mode=m;
  ["practice","vocab","review"].forEach(id=>{
    document.getElementById("mode-"+id).style.display=m===id?"":"none";
    document.getElementById("tab-"+id).classList.toggle("active",m===id);
  });
  if(m==="vocab")renderVocab();
  if(m==="review")renderReview();
}

function getFilteredQ(){return S.cat==="全て"?[...QUESTIONS]:QUESTIONS.filter(q=>q.cat===S.cat);}

function initPractice(){S.qs=shuffle(getFilteredQ());S.idx=0;S.flipped=false;showCard();}

function renderCats(){
  document.getElementById("cat-row").innerHTML=CATEGORIES.map(c=>
    `<button class="cat-btn ${c===S.cat?'active':''}" onclick="selectCat('${c.replace(/'/g,"\\'")}')"> ${c}</button>`
  ).join("");
}

function selectCat(c){S.cat=c;renderCats();initPractice();}

function showCard(){
  const qs=S.qs;
  if(!qs.length){
    document.getElementById("card-counter").textContent="";
    document.getElementById("ja-text").textContent="この分類の問題がありません";
    document.getElementById("hint-row").innerHTML="";
    document.getElementById("judge-buttons").classList.remove("visible");
    return;
  }
  if(S.idx>=qs.length){showResult();return;}
  const q=qs[S.idx];
  const pct=Math.round(S.idx/qs.length*100);
  document.getElementById("prog").style.width=pct+"%";
  document.getElementById("card-counter").textContent=(S.idx+1)+" / "+qs.length;
  const fc=document.getElementById("flip-card");
  fc.classList.remove("flipped");
  S.flipped=false;
  document.getElementById("judge-buttons").classList.remove("visible");
  document.getElementById("ja-text").textContent=q.ja;
  document.getElementById("hint-row").innerHTML=q.hint.map(h=>`<span class="hint-chip">🔑 ${h}</span>`).join("");
  document.getElementById("en-text").textContent=q.en;
  document.getElementById("alt-text").textContent=q.alt?"別解: "+q.alt:"";
  document.getElementById("key-tag").textContent="📌 "+q.key;
  document.getElementById("info-text").textContent=q.info||"";
}

function flipCard(){
  if(S.idx>=S.qs.length)return;
  S.flipped=!S.flipped;
  document.getElementById("flip-card").classList.toggle("flipped",S.flipped);
  if(S.flipped){
    setTimeout(()=>document.getElementById("judge-buttons").classList.add("visible"),200);
  } else {
    document.getElementById("judge-buttons").classList.remove("visible");
  }
}

function judge(ok){
  if(!S.flipped)return;
  const q=S.qs[S.idx];
  S.total++;
  if(ok){S.correct++;S.wrong=S.wrong.filter(w=>w.ja!==q.ja);}
  else if(!S.wrong.find(w=>w.ja===q.ja))S.wrong.push(q);
  updateStats();S.idx++;S.flipped=false;
  const fc=document.getElementById("flip-card");
  fc.style.transition="none";fc.classList.remove("flipped");
  document.getElementById("judge-buttons").classList.remove("visible");
  setTimeout(()=>{fc.style.transition="";showCard();},60);
}

function showResult(){
  document.getElementById("prog").style.width="100%";
  document.getElementById("card-counter").textContent="完了！";
  document.getElementById("judge-buttons").classList.remove("visible");
  const pct=S.total>0?Math.round(S.correct/S.total*100):0;
  const emoji=pct>=80?"🎉":pct>=50?"💪":"📚";
  const msg=pct>=80?"素晴らしい！また日本に行きたくなった？🗾":pct>=50?"いい調子！もう少し頑張ろう！":"繰り返しが力になる！続けよう！";
  document.querySelector(".flip-scene").innerHTML=`
    <div class="result-screen">
      <div class="result-emoji">${emoji}</div>
      <div class="result-pct">${pct}%</div>
      <div class="result-msg">${msg}</div>
      <div class="result-nums">
        <div><div class="r-num ok">${S.correct}</div><div class="r-lbl">できた</div></div>
        <div><div class="r-num ng">${S.wrong.length}</div><div class="r-lbl">要復習</div></div>
      </div>
      <div class="result-btns">
        <button class="btn-result primary" onclick="location.reload()">もう一度最初から 🔄</button>
        ${S.wrong.length>0?`<button class="btn-result amber" onclick="startWrongPractice()">間違いだけ集中練習 🔁</button>`:""}
      </div>
    </div>`;
}

function startWrongPractice(){
  document.querySelector(".flip-scene").innerHTML=`
    <div class="flip-card" id="flip-card" onclick="flipCard()">
      <div class="card-face card-front" id="card-front">
        <div class="face-label">日本語を見て英語で言おう</div>
        <div class="ja-text" id="ja-text"></div>
        <div class="hint-row" id="hint-row"></div>
        <div class="tap-hint"><span class="tap-icon">👆</span> タップで英語を確認</div>
      </div>
      <div class="card-face card-back">
        <div class="face-label">Answer</div>
        <div class="en-text" id="en-text"></div>
        <div class="alt-text" id="alt-text"></div>
        <div class="key-tag" id="key-tag"></div>
        <div class="info-text" id="info-text"></div>
      </div>
    </div>`;
  S.qs=shuffle([...S.wrong]);S.idx=0;S.flipped=false;showCard();
}

function renderVocab(){
  document.getElementById("vocab-list").innerHTML=VOCAB.map(v=>`
    <div class="vocab-card">
      <div class="vocab-phrase">${v.phrase}</div>
      <div class="vocab-cat">${v.category}</div>
      <div class="vocab-meaning">🇯🇵 ${v.meaning}</div>
      <div class="vocab-examples">${v.examples.map(e=>`
        <div class="ex-item">
          <div class="ex-en">${e.en}</div>
          <div class="ex-ja">${e.ja}</div>
        </div>`).join("")}
      </div>
    </div>`).join("");
}

function renderReview(){
  const area=document.getElementById("review-list");
  if(!S.wrong.length){
    area.innerHTML=`<div class="empty-state"><div class="ee">🎊</div><p>要復習の問題はありません！<br>全問マスターしました！</p></div>`;
    return;
  }
  area.innerHTML=`
    <div style="font-size:13px;color:var(--text-hint);margin-bottom:12px">${S.wrong.length}問 要復習</div>
    ${S.wrong.map((q,i)=>`
      <div class="review-item">
        <div class="ri-ja">${q.ja}</div>
        <div class="ri-en">→ ${q.en}</div>
        <span class="ri-key">📌 ${q.key}</span>
        <div class="ri-actions">
          <button class="btn-sm green" onclick="markMastered(${i})">✓ 覚えた</button>
          <button class="btn-sm gray" onclick="practiceThis(${i})">練習する →</button>
        </div>
      </div>`).join("")}
    <div style="margin-top:16px">
      <button style="width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;color:#fff;background:var(--red);font-family:'Noto Sans JP',sans-serif" onclick="startWrongAndSwitch()">全ての要復習をフリップ練習 🔁</button>
    </div>`;
}

function markMastered(i){S.wrong.splice(i,1);updateStats();renderReview();}
function practiceThis(i){S.qs=[S.wrong[i]];S.idx=0;S.flipped=false;switchMode("practice");renderCats();showCard();}
function startWrongAndSwitch(){switchMode("practice");startWrongPractice();}

renderCats();initPractice();updateStats();
</script>
</body>
</html>
