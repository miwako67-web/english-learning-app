<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Meaning of Life 瞬間英作文</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --bg: #f0ede8;
  --card: #ffffff;
  --text: #2c2a26;
  --text-sub: #6b6860;
  --text-hint: #9c9a94;
  --indigo: #3d3a8c;
  --indigo-light: #eeecfb;
  --indigo-mid: #5e5ac4;
  --teal: #1e6b5e;
  --teal-light: #e5f4f1;
  --teal-mid: #2e9e87;
  --amber: #8a6020;
  --amber-light: #fdf6e3;
  --red: #a32d2d;
  --red-light: #fdeaea;
  --border: #e0dbd2;
  --radius: 20px;
  --radius-sm: 10px;
  --shadow: 0 4px 20px rgba(0,0,0,0.09);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.13);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 10px;
  position: sticky; top: 0; z-index: 100;
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.app-title {
  font-family: 'Nunito', sans-serif;
  font-size: 17px; font-weight: 800;
  color: var(--indigo);
  display: flex; align-items: center; gap: 6px;
}

.stats-row { display: flex; gap: 14px; }
.stat-item { text-align: center; }
.stat-n { font-size: 17px; font-weight: 700; font-family: 'Nunito', sans-serif; line-height: 1; }
.stat-l { font-size: 10px; color: var(--text-hint); margin-top: 1px; }

.nav-tabs { display: flex; gap: 3px; }
.nav-tab {
  flex: 1; padding: 7px 4px;
  border: none; border-radius: 8px;
  background: transparent;
  font-size: 12px; font-weight: 500;
  color: var(--text-sub); cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 3px;
}
.nav-tab.active { background: var(--indigo-light); color: var(--indigo); font-weight: 700; }
.nav-tab .rbadge {
  background: var(--red); color: #fff;
  border-radius: 10px; padding: 1px 6px;
  font-size: 10px; font-weight: 700;
}

.progress-outer { padding: 8px 20px 0; max-width: 600px; margin: 0 auto; width: 100%; }
.progress-wrap { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--indigo-mid), var(--indigo));
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

.content { flex: 1; padding: 16px 16px 100px; max-width: 600px; margin: 0 auto; width: 100%; }

.cat-scroll {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 4px; margin-bottom: 16px;
  scrollbar-width: none;
}
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-btn {
  white-space: nowrap; padding: 5px 13px;
  border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--card); font-size: 12px; font-weight: 500;
  color: var(--text-sub); cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.12s;
}
.cat-btn.active { background: var(--indigo); color: #fff; border-color: var(--indigo); }

.flip-scene { width: 100%; perspective: 1200px; margin-bottom: 18px; }

.flip-card {
  width: 100%; min-height: 290px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}
.flip-card.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute; inset: 0;
  border-radius: var(--radius);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px 24px;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
}

.card-front { background: var(--card); }
.card-front .face-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: var(--text-hint);
  margin-bottom: 16px;
  background: var(--bg); padding: 4px 12px; border-radius: 20px;
}
.card-front .ja-text {
  font-size: 20px; font-weight: 700;
  line-height: 1.7; text-align: center;
  color: var(--text); margin-bottom: 18px;
}
.card-front .hint-row {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
}
.hint-chip {
  background: var(--indigo-light); color: var(--indigo);
  font-size: 12px; font-weight: 600;
  padding: 4px 12px; border-radius: 6px;
  font-family: 'Nunito', sans-serif;
}
.card-front .tap-hint {
  margin-top: 22px; font-size: 12px; color: var(--text-hint);
  display: flex; align-items: center; gap: 5px;
}
.tap-icon { font-size: 16px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.5;transform:scale(0.9)}
}

.card-back {
  background: linear-gradient(135deg, #3d3a8c 0%, #5e5ac4 100%);
  transform: rotateY(180deg);
}
.card-back .face-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 16px;
  background: rgba(255,255,255,0.15); padding: 4px 12px; border-radius: 20px;
}
.card-back .en-text {
  font-family: 'Nunito', sans-serif;
  font-size: 20px; font-weight: 700;
  line-height: 1.6; text-align: center;
  color: #fff; margin-bottom: 10px;
}
.card-back .alt-text {
  font-size: 13px; color: rgba(255,255,255,0.72);
  text-align: center; line-height: 1.6; margin-bottom: 10px;
}
.card-back .key-tag {
  background: rgba(255,255,255,0.2); color: #fff;
  font-size: 12px; font-weight: 600;
  padding: 5px 14px; border-radius: 20px;
  font-family: 'Nunito', sans-serif; margin-bottom: 8px;
}
.card-back .info-text {
  font-size: 12px; color: rgba(255,255,255,0.65);
  text-align: center; line-height: 1.6; padding: 0 8px;
}

.judge-buttons {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-top: 4px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s 0.3s;
}
.judge-buttons.visible { opacity: 1; pointer-events: all; }

.btn-judge {
  padding: 16px 12px; border-radius: var(--radius-sm);
  border: none; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.btn-judge:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.15); }
.btn-judge:active { transform: scale(0.97); }
.btn-ng { background: var(--red-light); color: var(--red); border: 2px solid #f7c1c1; }
.btn-ng:hover { background: var(--red); color: #fff; border-color: var(--red); }
.btn-ok { background: var(--teal-light); color: var(--teal); border: 2px solid #9fd4cc; }
.btn-ok:hover { background: var(--teal); color: #fff; border-color: var(--teal); }
.btn-judge .btn-icon { font-size: 24px; }
.btn-judge .btn-lbl { font-size: 13px; }
.btn-judge .btn-sub { font-size: 10px; opacity: 0.7; }

.card-counter {
  text-align: center; margin-bottom: 12px;
  font-size: 13px; color: var(--text-hint);
  font-family: 'Nunito', sans-serif; font-weight: 600;
}

.result-screen {
  background: var(--card); border-radius: var(--radius);
  padding: 36px 24px; text-align: center;
  box-shadow: var(--shadow-lg); border: 1px solid var(--border);
}
.result-emoji { font-size: 52px; margin-bottom: 10px; }
.result-pct { font-size: 68px; font-weight: 800; font-family: 'Nunito', sans-serif; color: var(--indigo); line-height: 1; margin-bottom: 8px; }
.result-msg { font-size: 16px; color: var(--text-sub); margin-bottom: 28px; }
.result-nums { display: flex; justify-content: center; gap: 40px; margin-bottom: 28px; }
.r-num { font-size: 32px; font-weight: 800; font-family: 'Nunito', sans-serif; }
.r-num.ok { color: var(--teal); }
.r-num.ng { color: var(--red); }
.r-lbl { font-size: 12px; color: var(--text-hint); margin-top: 2px; }
.result-btns { display: flex; flex-direction: column; gap: 10px; }
.btn-result {
  width: 100%; padding: 14px; border-radius: var(--radius-sm);
  border: 2px solid var(--border); font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  background: var(--card); color: var(--text); transition: all 0.13s;
}
.btn-result:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.btn-result.primary { background: var(--indigo); color: #fff; border-color: var(--indigo); }
.btn-result.amber { border-color: var(--amber); color: var(--amber); }

.vocab-card {
  background: var(--card); border-radius: var(--radius);
  padding: 18px; margin-bottom: 10px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
}
.vocab-phrase { font-size: 17px; font-weight: 700; color: var(--indigo); font-family: 'Nunito', sans-serif; margin-bottom: 4px; }
.vocab-cat { font-size: 11px; color: var(--text-hint); margin-bottom: 6px; }
.vocab-meaning { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
.vocab-examples { display: flex; flex-direction: column; gap: 6px; }
.ex-item { background: var(--indigo-light); border-radius: 8px; padding: 10px 12px; }
.ex-en { font-size: 14px; font-weight: 600; color: var(--indigo); font-family: 'Nunito', sans-serif; line-height: 1.5; }
.ex-ja { font-size: 12px; color: var(--text-sub); margin-top: 3px; line-height: 1.5; }

.review-item {
  background: var(--card); border-radius: var(--radius);
  padding: 16px 18px; margin-bottom: 10px;
  border-left: 4px solid var(--amber);
  box-shadow: var(--shadow);
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.ri-ja { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
.ri-en { font-size: 14px; font-weight: 600; color: var(--text-sub); font-family: 'Nunito', sans-serif; line-height: 1.5; margin-bottom: 6px; }
.ri-key { font-size: 12px; background: var(--amber-light); color: var(--amber); padding: 3px 8px; border-radius: 6px; display: inline-block; font-weight: 600; font-family: 'Nunito', sans-serif; }
.ri-actions { display: flex; gap: 6px; margin-top: 10px; }
.btn-sm { padding: 6px 14px; border-radius: 8px; border: 1.5px solid; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.12s; }
.btn-sm.teal { border-color: var(--teal); background: var(--teal-light); color: var(--teal); }
.btn-sm.teal:hover { background: var(--teal); color: #fff; }
.btn-sm.gray { border-color: var(--border); background: var(--bg); color: var(--text-sub); }

.empty-state { text-align: center; padding: 56px 20px; color: var(--text-hint); }
.empty-state .ee { font-size: 44px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; line-height: 1.8; }

@media(max-width:400px){
  .card-front .ja-text{font-size:17px}
  .card-back .en-text{font-size:17px}
  .result-pct{font-size:52px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="app-title">🌌 Meaning of Life</div>
    <div class="stats-row">
      <div class="stat-item"><div class="stat-n" id="s-total" style="color:var(--text)">0</div><div class="stat-l">合計</div></div>
      <div class="stat-item"><div class="stat-n" id="s-ok" style="color:var(--teal)">0</div><div class="stat-l">できた</div></div>
      <div class="stat-item"><div class="stat-n" id="s-ng" style="color:var(--red)">0</div><div class="stat-l">復習</div></div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-practice" onclick="switchMode('practice')">🗣️ 練習</button>
    <button class="nav-tab" id="tab-vocab" onclick="switchMode('vocab')">📖 単語帳</button>
    <button class="nav-tab" id="tab-review" onclick="switchMode('review')">🔁 要復習<span class="rbadge" id="rbadge" style="display:none">0</span></button>
  </div>
</header>

<div class="progress-outer">
  <div class="progress-wrap"><div class="progress-fill" id="prog" style="width:0%"></div></div>
</div>

<div class="content">
  <div id="mode-practice">
    <div class="cat-scroll" id="cat-row"></div>
    <div class="card-counter" id="card-counter"></div>
    <div class="flip-scene">
      <div class="flip-card" id="flip-card" onclick="flipCard()">
        <div class="card-face card-front">
          <div class="face-label">日本語を見て英語で言おう</div>
          <div class="ja-text" id="ja-text"></div>
          <div class="hint-row" id="hint-row"></div>
          <div class="tap-hint"><span class="tap-icon">👆</span> タップで英語を確認</div>
        </div>
        <div class="card-face card-back">
          <div class="face-label">Answer</div>
          <div class="en-text" id="en-text"></div>
          <div class="alt-text" id="alt-text"></div>
          <div class="key-tag" id="key-tag"></div>
          <div class="info-text" id="info-text"></div>
        </div>
      </div>
    </div>
    <div class="judge-buttons" id="judge-buttons">
      <button class="btn-judge btn-ng" onclick="judge(false)">
        <span class="btn-icon">😅</span><span class="btn-lbl">できなかった</span><span class="btn-sub">要復習に追加</span>
      </button>
      <button class="btn-judge btn-ok" onclick="judge(true)">
        <span class="btn-icon">✅</span><span class="btn-lbl">できた！</span><span class="btn-sub">次へ進む</span>
      </button>
    </div>
  </div>
  <div id="mode-vocab" style="display:none"><div id="vocab-list"></div></div>
  <div id="mode-review" style="display:none"><div id="review-list"></div></div>
</div>

<script>
const VOCAB = [
  {
    phrase: "keeps creeping back",
    meaning: "じわじわと戻ってくる / いつの間にか頭をもたげてくる",
    category: "思考・感情",
    examples: [
      { en: "That question keeps creeping back no matter how busy I get.", ja: "どれだけ忙しくても、その問いはじわじわと戻ってくる。" },
      { en: "The doubt keeps creeping back every time I make a decision.", ja: "決断するたびに、疑いがじわじわと戻ってくる。" },
      { en: "An old memory keeps creeping back whenever I hear that song.", ja: "その曲を聴くたびに、古い記憶がじわじわと蘇ってくる。" },
      { en: "The anxiety keeps creeping back even after therapy.", ja: "カウンセリングの後でも、不安はじわじわと戻ってくる。" },
      { en: "That feeling of loneliness keeps creeping back at night.", ja: "夜になると、孤独感がじわじわと戻ってくる。" },
      { en: "The idea keeps creeping back — maybe I should just try it.", ja: "そのアイデアがじわじわと頭に戻ってくる、やってみるべきかもしれない。" },
      { en: "His name keeps creeping back into my thoughts.", ja: "彼の名前が何度もじわじわと頭に浮かんでくる。" },
      { en: "The regret keeps creeping back whenever I think about it.", ja: "そのことを考えるたびに、後悔がじわじわと戻ってくる。" },
      { en: "That question keeps creeping back: did I make the right choice?", ja: "その問いがじわじわと戻ってくる、正しい選択をしたのだろうか？" },
      { en: "No matter how much I distract myself, the worry keeps creeping back.", ja: "どれだけ気を紛らわせても、心配がじわじわと戻ってくる。" }
    ]
  },
  {
    phrase: "have come to terms with",
    meaning: "〜を受け入れる / 〜と折り合いをつける",
    category: "受容・理解",
    examples: [
      { en: "I have come to terms with the idea that life may have no inherent meaning.", ja: "人生に本質的な意味がないかもしれないという考えを受け入れた。" },
      { en: "She has come to terms with losing the competition.", ja: "彼女は試合に負けたことを受け入れた。" },
      { en: "It took years, but he finally came to terms with his past.", ja: "何年もかかったが、彼はついに自分の過去と折り合いをつけた。" },
      { en: "I'm slowly coming to terms with the fact that things change.", ja: "物事は変わるという事実を、少しずつ受け入れつつある。" },
      { en: "Have you come to terms with the decision you made?", ja: "自分が下した決断と折り合いはつきましたか？" },
      { en: "She's still struggling to come to terms with the diagnosis.", ja: "彼女はまだ診断結果を受け入れることに苦しんでいる。" },
      { en: "Coming to terms with failure is part of growing.", ja: "失敗と折り合いをつけることは成長の一部だ。" },
      { en: "He came to terms with the fact that not everyone would like him.", ja: "全員に好かれるわけではないという事実と折り合いをつけた。" },
      { en: "I've come to terms with living alone — it has its own peace.", ja: "一人暮らしと折り合いをつけた、それなりの静けさがある。" },
      { en: "Coming to terms with uncertainty is a lifelong practice.", ja: "不確かさを受け入れることは、一生をかけた修行だ。" }
    ]
  },
  {
    phrase: "existential",
    meaning: "実存的な / 存在に関わる / 実存主義的な",
    category: "哲学・思考",
    examples: [
      { en: "I still feel a kind of existential ache — a heaviness that's hard to shake.", ja: "実存的な痛み、振り払いがたい重さを今でも感じる。" },
      { en: "He went through an existential crisis after losing his job.", ja: "仕事を失った後、彼は実存的な危機に陥った。" },
      { en: "These are existential questions that philosophers have wrestled with for centuries.", ja: "これらは哲学者たちが何世紀にもわたって格闘してきた実存的な問いだ。" },
      { en: "The pandemic forced many people to face existential fears.", ja: "パンデミックは多くの人に実存的な恐怖と向き合わせた。" },
      { en: "Late nights often bring on existential thoughts.", ja: "深夜はしばしば実存的な思考を呼び起こす。" },
      { en: "She felt an existential emptiness despite her success.", ja: "成功しているにもかかわらず、彼女は実存的な空虚感を感じた。" },
      { en: "Art can help us deal with existential anxiety.", ja: "芸術は実存的な不安に対処するのに役立つことがある。" },
      { en: "Climate change poses an existential threat to humanity.", ja: "気候変動は人類にとって実存的な脅威となっている。" },
      { en: "Teenagers often go through existential phases.", ja: "十代の若者はしばしば実存的な時期を経験する。" },
      { en: "That book helped me understand my own existential fears.", ja: "その本は自分の実存的な恐怖を理解する助けになった。" }
    ]
  },
  {
    phrase: "contradiction",
    meaning: "矛盾 / 逆説 / 相反するもの",
    category: "哲学・思考",
    examples: [
      { en: "That contradiction is exhausting — it still matters even when nothing should.", ja: "その矛盾は消耗する、何も重要でないはずなのに、それでも重要だと感じてしまう。" },
      { en: "There's a contradiction between what he says and what he does.", ja: "彼の言葉と行動の間には矛盾がある。" },
      { en: "I'm full of contradictions — that's what makes me human.", ja: "私は矛盾だらけだ、それが人間たる所以だ。" },
      { en: "The contradiction at the heart of this argument is hard to ignore.", ja: "この議論の核心にある矛盾は無視しがたい。" },
      { en: "She lived with the contradiction of loving solitude but craving connection.", ja: "孤独を愛しながらもつながりを求めるという矛盾の中で彼女は生きた。" },
      { en: "Holding two contradictions at once is the mark of a complex thinker.", ja: "二つの矛盾を同時に抱えられることが、複雑な思考者の証だ。" },
      { en: "Life is full of contradictions — embrace them.", ja: "人生は矛盾に満ちている、それを受け入れよう。" },
      { en: "The contradiction between freedom and responsibility never fully resolves.", ja: "自由と責任の矛盾は完全には解消されない。" },
      { en: "He noticed the contradiction in her words immediately.", ja: "彼はすぐに彼女の言葉の矛盾に気づいた。" },
      { en: "That's the beautiful contradiction of being alive.", ja: "それが生きているということの美しい矛盾だ。" }
    ]
  },
  {
    phrase: "stepping back",
    meaning: "一歩引いて考える / 距離を置く / 俯瞰する",
    category: "内省・思考",
    examples: [
      { en: "One thing that helps me is stepping back and thinking of all this as a simulation.", ja: "一歩引いて、これ全てをシミュレーションとして捉えることが助けになる。" },
      { en: "Sometimes stepping back is the best thing you can do.", ja: "時には一歩引くことが最善の選択だ。" },
      { en: "Try stepping back from the situation before reacting.", ja: "反応する前に、状況から一歩引いてみて。" },
      { en: "Stepping back helped me see the bigger picture.", ja: "一歩引くことで、より大きな視点が見えた。" },

  {ja:"彼の落ち着いた存在感が、みんなを安心させた。",en:"His calming presence made everyone feel at ease.",alt:"Everyone felt at ease in his calming presence.",key:"presence",hint:["presence","calming / at ease"],cat:"受容・内省",info:"calming = 落ち着かせる / feel at ease = 安心する"},
];

const CATEGORIES = ["全て","思考・感情","受容・理解","哲学・思考","内省・思考","受容・内省"];

const S = {
  mode:"practice", cat:"全て", qs:[], idx:0, flipped:false,
  wrong:[], correct:0, total:0
};

function shuffle(a){let arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function updateStats(){
  document.getElementById("s-total").textContent=S.total;
  document.getElementById("s-ok").textContent=S.correct;
  document.getElementById("s-ng").textContent=S.wrong.length;
  const b=document.getElementById("rbadge");
  if(S.wrong.length>0){b.style.display="";b.textContent=S.wrong.length;}
  else b.style.display="none";
}

function switchMode(m){
  S.mode=m;
  ["practice","vocab","review"].forEach(id=>{
    document.getElementById("mode-"+id).style.display=m===id?"":"none";
    document.getElementById("tab-"+id).classList.toggle("active",m===id);
  });
  if(m==="vocab")renderVocab();
  if(m==="review")renderReview();
}

function getFilteredQ(){return S.cat==="全て"?[...QUESTIONS]:QUESTIONS.filter(q=>q.cat===S.cat);}
function initPractice(){S.qs=shuffle(getFilteredQ());S.idx=0;S.flipped=false;showCard();}

function renderCats(){
  document.getElementById("cat-row").innerHTML=CATEGORIES.map(c=>
    `<button class="cat-btn ${c===S.cat?'active':''}" onclick="selectCat('${c.replace(/'/g,"\\'")}')"> ${c}</button>`
  ).join("");
}
function selectCat(c){S.cat=c;renderCats();initPractice();}

function showCard(){
  const qs=S.qs;
  if(!qs.length){
    document.getElementById("card-counter").textContent="";
    document.getElementById("ja-text").textContent="この分類の問題がありません";
    document.getElementById("hint-row").innerHTML="";
    document.getElementById("judge-buttons").classList.remove("visible");
    return;
  }
  if(S.idx>=qs.length){showResult();return;}
  const q=qs[S.idx];
  document.getElementById("prog").style.width=Math.round(S.idx/qs.length*100)+"%";
  document.getElementById("card-counter").textContent=(S.idx+1)+" / "+qs.length;
  const fc=document.getElementById("flip-card");
  fc.classList.remove("flipped");S.flipped=false;
  document.getElementById("judge-buttons").classList.remove("visible");
  document.getElementById("ja-text").textContent=q.ja;
  document.getElementById("hint-row").innerHTML=q.hint.map(h=>`<span class="hint-chip">🔑 ${h}</span>`).join("");
  document.getElementById("en-text").textContent=q.en;
  document.getElementById("alt-text").textContent=q.alt?"別解: "+q.alt:"";
  document.getElementById("key-tag").textContent="📌 "+q.key;
  document.getElementById("info-text").textContent=q.info||"";
}

function flipCard(){
  if(S.idx>=S.qs.length)return;
  S.flipped=!S.flipped;
  document.getElementById("flip-card").classList.toggle("flipped",S.flipped);
  if(S.flipped)setTimeout(()=>document.getElementById("judge-buttons").classList.add("visible"),200);
  else document.getElementById("judge-buttons").classList.remove("visible");
}

function judge(ok){
  if(!S.flipped)return;
  const q=S.qs[S.idx];
  S.total++;
  if(ok){S.correct++;S.wrong=S.wrong.filter(w=>w.ja!==q.ja);}
  else if(!S.wrong.find(w=>w.ja===q.ja))S.wrong.push(q);
  updateStats();S.idx++;S.flipped=false;
  const fc=document.getElementById("flip-card");
  fc.style.transition="none";fc.classList.remove("flipped");
  document.getElementById("judge-buttons").classList.remove("visible");
  setTimeout(()=>{fc.style.transition="";showCard();},60);
}

function showResult(){
  document.getElementById("prog").style.width="100%";
  document.getElementById("card-counter").textContent="完了！";
  document.getElementById("judge-buttons").classList.remove("visible");
  const pct=S.total>0?Math.round(S.correct/S.total*100):0;
  const emoji=pct>=80?"✨":pct>=50?"💪":"📚";
  const msg=pct>=80?"素晴らしい！存在することを感じられた？🌌":pct>=50?"いい調子！もう少し頑張ろう！":"繰り返しが力になる！続けよう！";
  document.querySelector(".flip-scene").innerHTML=`
    <div class="result-screen">
      <div class="result-emoji">${emoji}</div>
      <div class="result-pct">${pct}%</div>
      <div class="result-msg">${msg}</div>
      <div class="result-nums">
        <div><div class="r-num ok">${S.correct}</div><div class="r-lbl">できた</div></div>
        <div><div class="r-num ng">${S.wrong.length}</div><div class="r-lbl">要復習</div></div>
      </div>
      <div class="result-btns">
        <button class="btn-result primary" onclick="location.reload()">もう一度最初から 🔄</button>
        ${S.wrong.length>0?`<button class="btn-result amber" onclick="startWrongPractice()">間違いだけ集中練習 🔁</button>`:""}
      </div>
    </div>`;
}

function startWrongPractice(){
  document.querySelector(".flip-scene").innerHTML=`
    <div class="flip-card" id="flip-card" onclick="flipCard()">
      <div class="card-face card-front">
        <div class="face-label">日本語を見て英語で言おう</div>
        <div class="ja-text" id="ja-text"></div>
        <div class="hint-row" id="hint-row"></div>
        <div class="tap-hint"><span class="tap-icon">👆</span> タップで英語を確認</div>
      </div>
      <div class="card-face card-back">
        <div class="face-label">Answer</div>
        <div class="en-text" id="en-text"></div>
        <div class="alt-text" id="alt-text"></div>
        <div class="key-tag" id="key-tag"></div>
        <div class="info-text" id="info-text"></div>
      </div>
    </div>`;
  S.qs=shuffle([...S.wrong]);S.idx=0;S.flipped=false;showCard();
}

function renderVocab(){
  document.getElementById("vocab-list").innerHTML=VOCAB.map(v=>`
    <div class="vocab-card">
      <div class="vocab-phrase">${v.phrase}</div>
      <div class="vocab-cat">${v.category}</div>
      <div class="vocab-meaning">🇯🇵 ${v.meaning}</div>
      <div class="vocab-examples">${v.examples.map(e=>`
        <div class="ex-item">
          <div class="ex-en">${e.en}</div>
          <div class="ex-ja">${e.ja}</div>
        </div>`).join("")}
      </div>
    </div>`).join("");
}

function renderReview(){
  const area=document.getElementById("review-list");
  if(!S.wrong.length){
    area.innerHTML=`<div class="empty-state"><div class="ee">🎊</div><p>要復習の問題はありません！<br>全問マスターしました！</p></div>`;
    return;
  }
  area.innerHTML=`
    <div style="font-size:13px;color:var(--text-hint);margin-bottom:12px">${S.wrong.length}問 要復習</div>
    ${S.wrong.map((q,i)=>`
      <div class="review-item">
        <div class="ri-ja">${q.ja}</div>
        <div class="ri-en">→ ${q.en}</div>
        <span class="ri-key">📌 ${q.key}</span>
        <div class="ri-actions">
          <button class="btn-sm teal" onclick="markMastered(${i})">✓ 覚えた</button>
          <button class="btn-sm gray" onclick="practiceThis(${i})">練習する →</button>
        </div>
      </div>`).join("")}
    <div style="margin-top:16px">
      <button style="width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;color:#fff;background:var(--indigo);font-family:'Noto Sans JP',sans-serif" onclick="startWrongAndSwitch()">全ての要復習をフリップ練習 🔁</button>
    </div>`;
}

function markMastered(i){S.wrong.splice(i,1);updateStats();renderReview();}
function practiceThis(i){S.qs=[S.wrong[i]];S.idx=0;S.flipped=false;switchMode("practice");renderCats();showCard();}
function startWrongAndSwitch(){switchMode("practice");startWrongPractice();}

renderCats();initPractice();updateStats();
</script>
</body>
</html>
