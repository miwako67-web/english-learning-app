<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coco 瞬間英作文 フリップ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --bg: #f5f2ed;
  --card: #ffffff;
  --text: #2c2a26;
  --text-sub: #6b6860;
  --text-hint: #9c9a94;
  --green: #3a7d5a;
  --green-light: #e8f5ee;
  --green-mid: #5aab7e;
  --green-dark: #2a5e42;
  --blue: #2c5f8a;
  --blue-light: #e6f0f9;
  --amber: #8a6020;
  --amber-light: #fdf3e0;
  --red: #933030;
  --red-light: #fdeaea;
  --red-mid: #c0504d;
  --border: #e0ddd6;
  --radius: 20px;
  --radius-sm: 10px;
  --shadow: 0 4px 20px rgba(0,0,0,0.09);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.13);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 10px;
  position: sticky; top: 0; z-index: 100;
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.app-title {
  font-family: 'Nunito', sans-serif;
  font-size: 19px; font-weight: 800;
  color: var(--green);
  display: flex; align-items: center; gap: 6px;
}

.stats-row {
  display: flex; gap: 14px; align-items: center;
}
.stat-item { text-align: center; }
.stat-n { font-size: 17px; font-weight: 700; font-family: 'Nunito', sans-serif; line-height: 1; }
.stat-l { font-size: 10px; color: var(--text-hint); margin-top: 1px; }

.nav-tabs {
  display: flex; gap: 3px;
}
.nav-tab {
  flex: 1; padding: 7px 4px;
  border: none; border-radius: 8px;
  background: transparent;
  font-size: 12px; font-weight: 500;
  color: var(--text-sub); cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 3px;
}
.nav-tab.active { background: var(--green-light); color: var(--green); font-weight: 700; }
.nav-tab .rbadge {
  background: var(--red-mid); color: #fff;
  border-radius: 10px; padding: 1px 6px;
  font-size: 10px; font-weight: 700;
}

/* ── Progress ── */
.progress-wrap {
  height: 5px; background: var(--border);
  margin: 0 20px 0;
  border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green-mid), var(--green));
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

/* ── Content ── */
.content { flex: 1; padding: 20px 16px 100px; max-width: 600px; margin: 0 auto; width: 100%; }

/* ── Cat filter ── */
.cat-scroll {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 4px; margin-bottom: 18px;
  scrollbar-width: none;
}
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-btn {
  white-space: nowrap; padding: 5px 13px;
  border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--card); font-size: 12px; font-weight: 500;
  color: var(--text-sub); cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.12s;
}
.cat-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

/* ── FLIP CARD ── */
.flip-scene {
  width: 100%;
  perspective: 1200px;
  margin-bottom: 20px;
}

.flip-card {
  width: 100%; min-height: 280px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.55s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}

.flip-card.flipped {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute; inset: 0;
  border-radius: var(--radius);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px 24px;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
}

/* Front = Japanese (question side) */
.card-front {
  background: var(--card);
}

.card-front .face-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: var(--text-hint); text-transform: uppercase;
  margin-bottom: 18px;
  background: var(--bg); padding: 4px 12px; border-radius: 20px;
}

.card-front .ja-text {
  font-size: 22px; font-weight: 700;
  line-height: 1.65; text-align: center;
  color: var(--text);
  margin-bottom: 20px;
}

.card-front .hint-row {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
}
.hint-chip {
  background: var(--blue-light);
  color: var(--blue);
  font-size: 12px; font-weight: 600;
  padding: 4px 12px; border-radius: 6px;
  font-family: 'Nunito', sans-serif;
}

.card-front .tap-hint {
  margin-top: 24px;
  font-size: 12px; color: var(--text-hint);
  display: flex; align-items: center; gap: 5px;
}
.tap-hint .tap-icon { font-size: 16px; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.9); }
}

/* Back = English (answer side) */
.card-back {
  background: var(--green);
  transform: rotateY(180deg);
}

.card-back .face-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: rgba(255,255,255,0.6); text-transform: uppercase;
  margin-bottom: 18px;
  background: rgba(255,255,255,0.15); padding: 4px 12px; border-radius: 20px;
}

.card-back .en-text {
  font-family: 'Nunito', sans-serif;
  font-size: 22px; font-weight: 700;
  line-height: 1.6; text-align: center;
  color: #ffffff;
  margin-bottom: 12px;
}

.card-back .alt-text {
  font-size: 13px; color: rgba(255,255,255,0.7);
  text-align: center; line-height: 1.6;
  margin-bottom: 12px;
}

.card-back .key-tag {
  background: rgba(255,255,255,0.2);
  color: #fff;
  font-size: 12px; font-weight: 600;
  padding: 5px 14px; border-radius: 20px;
  font-family: 'Nunito', sans-serif;
  margin-bottom: 8px;
}

.card-back .info-text {
  font-size: 12px; color: rgba(255,255,255,0.65);
  text-align: center; line-height: 1.6;
  padding: 0 8px;
}

/* ── Judge buttons ── */
.judge-buttons {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-top: 4px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s 0.3s;
}
.judge-buttons.visible {
  opacity: 1; pointer-events: all;
}

.btn-judge {
  padding: 16px 12px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.btn-judge:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.15); }
.btn-judge:active { transform: scale(0.97); }

.btn-ng {
  background: var(--red-light);
  color: var(--red);
  border: 2px solid #f7c1c1;
}
.btn-ng:hover { background: var(--red); color: #fff; border-color: var(--red); }

.btn-ok {
  background: var(--green-light);
  color: var(--green);
  border: 2px solid #c0dd97;
}
.btn-ok:hover { background: var(--green); color: #fff; border-color: var(--green); }

.btn-judge .btn-icon { font-size: 24px; }
.btn-judge .btn-lbl { font-size: 13px; }
.btn-judge .btn-sub { font-size: 10px; opacity: 0.7; }

/* ── Card counter ── */
.card-counter {
  text-align: center; margin-bottom: 14px;
  font-size: 13px; color: var(--text-hint);
  font-family: 'Nunito', sans-serif;
  font-weight: 600;
}

/* ── Result screen ── */
.result-screen {
  background: var(--card);
  border-radius: var(--radius);
  padding: 36px 24px;
  text-align: center;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
}
.result-emoji { font-size: 52px; margin-bottom: 10px; }
.result-pct {
  font-size: 68px; font-weight: 800;
  font-family: 'Nunito', sans-serif;
  color: var(--green); line-height: 1; margin-bottom: 8px;
}
.result-msg { font-size: 16px; color: var(--text-sub); margin-bottom: 28px; }
.result-nums {
  display: flex; justify-content: center; gap: 40px; margin-bottom: 28px;
}
.r-num { font-size: 32px; font-weight: 800; font-family: 'Nunito', sans-serif; }
.r-num.ok { color: var(--green); }
.r-num.ng { color: var(--red); }
.r-lbl { font-size: 12px; color: var(--text-hint); margin-top: 2px; }
.result-btns { display: flex; flex-direction: column; gap: 10px; }
.btn-result {
  width: 100%; padding: 14px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  background: var(--card); color: var(--text);
  transition: all 0.13s;
}
.btn-result:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.btn-result.primary { background: var(--green); color: #fff; border-color: var(--green); }
.btn-result.amber { border-color: var(--amber); color: var(--amber); }

/* ── Vocab ── */
.vocab-card {
  background: var(--card); border-radius: var(--radius);
  padding: 18px; margin-bottom: 10px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
}
.vocab-phrase {
  font-size: 17px; font-weight: 700; color: var(--green);
  font-family: 'Nunito', sans-serif; margin-bottom: 4px;
}
.vocab-cat { font-size: 11px; color: var(--text-hint); margin-bottom: 6px; }
.vocab-meaning { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
.vocab-examples { display: flex; flex-direction: column; gap: 6px; }
.ex-item { background: var(--green-light); border-radius: 8px; padding: 10px 12px; }
.ex-en { font-size: 14px; font-weight: 600; color: var(--green); font-family: 'Nunito', sans-serif; line-height: 1.5; }
.ex-ja { font-size: 12px; color: var(--text-sub); margin-top: 3px; line-height: 1.5; }

/* ── Review ── */
.review-item {
  background: var(--card); border-radius: var(--radius);
  padding: 16px 18px; margin-bottom: 10px;
  border-left: 4px solid var(--red-mid);
  box-shadow: var(--shadow);
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.ri-ja { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
.ri-en { font-size: 14px; font-weight: 600; color: var(--text-sub); font-family: 'Nunito', sans-serif; line-height: 1.5; margin-bottom: 6px; }
.ri-key {
  font-size: 12px; background: var(--amber-light); color: var(--amber);
  padding: 3px 8px; border-radius: 6px; display: inline-block;
  font-weight: 600; font-family: 'Nunito', sans-serif;
}
.ri-actions { display: flex; gap: 6px; margin-top: 10px; }
.btn-sm {
  padding: 6px 14px; border-radius: 8px; border: 1.5px solid;
  font-size: 12px; font-weight: 700; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif; transition: all 0.12s;
}
.btn-sm.green { border-color: var(--green); background: var(--green-light); color: var(--green); }
.btn-sm.green:hover { background: var(--green); color: #fff; }
.btn-sm.gray { border-color: var(--border); background: var(--bg); color: var(--text-sub); }

.empty-state { text-align: center; padding: 56px 20px; color: var(--text-hint); }
.empty-state .ee { font-size: 44px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; line-height: 1.8; }

@media (max-width: 400px) {
  .card-front .ja-text { font-size: 19px; }
  .card-back .en-text { font-size: 19px; }
  .result-pct { font-size: 56px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="app-title">🐾 Coco スピーキング</div>
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-n" id="s-total" style="color:var(--text)">0</div>
        <div class="stat-l">合計</div>
      </div>
      <div class="stat-item">
        <div class="stat-n" id="s-ok" style="color:var(--green)">0</div>
        <div class="stat-l">できた</div>
      </div>
      <div class="stat-item">
        <div class="stat-n" id="s-ng" style="color:var(--red)">0</div>
        <div class="stat-l">復習</div>
      </div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-practice" onclick="switchMode('practice')">🗣️ 練習</button>
    <button class="nav-tab" id="tab-vocab" onclick="switchMode('vocab')">📖 単語帳</button>
    <button class="nav-tab" id="tab-review" onclick="switchMode('review')">🔁 要復習<span class="rbadge" id="rbadge" style="display:none">0</span></button>
  </div>
</header>

<div style="padding: 10px 20px 0; max-width: 600px; margin: 0 auto; width: 100%">
  <div class="progress-wrap">
    <div class="progress-fill" id="prog" style="width:0%"></div>
  </div>
</div>

<div class="content">

  <!-- ── PRACTICE ── -->
  <div id="mode-practice">
    <div class="cat-scroll" id="cat-row"></div>
    <div class="card-counter" id="card-counter">1 / 20</div>

    <div class="flip-scene">
      <div class="flip-card" id="flip-card" onclick="flipCard()">
        <!-- FRONT: Japanese -->
        <div class="card-face card-front" id="card-front">
          <div class="face-label">日本語を見て英語で言おう</div>
          <div class="ja-text" id="ja-text">Loading...</div>
          <div class="hint-row" id="hint-row"></div>
          <div class="tap-hint"><span class="tap-icon">👆</span> タップで英語を確認</div>
        </div>
        <!-- BACK: English -->
        <div class="card-face card-back" id="card-back">
          <div class="face-label">Answer</div>
          <div class="en-text" id="en-text"></div>
          <div class="alt-text" id="alt-text"></div>
          <div class="key-tag" id="key-tag"></div>
          <div class="info-text" id="info-text"></div>
        </div>
      </div>
    </div>

    <div class="judge-buttons" id="judge-buttons">
      <button class="btn-judge btn-ng" onclick="judge(false)">
        <span class="btn-icon">😅</span>
        <span class="btn-lbl">できなかった</span>
        <span class="btn-sub">要復習に追加</span>
      </button>
      <button class="btn-judge btn-ok" onclick="judge(true)">
        <span class="btn-icon">✅</span>
        <span class="btn-lbl">できた！</span>
        <span class="btn-sub">次へ進む</span>
      </button>
    </div>
  </div>

  <!-- ── VOCAB ── -->
  <div id="mode-vocab" style="display:none">
    <div id="vocab-list"></div>
  </div>

  <!-- ── REVIEW ── -->
  <div id="mode-review" style="display:none">
    <div id="review-list"></div>
  </div>

</div>

<script>
const VOCAB = [
  {
    phrase: "despite the name",
    meaning: "名前とは裏腹に / 〜という名前にもかかわらず",
    category: "逆接・対比",
    examples: [
      { en: "Despite the name, he's actually very gentle.", ja: "名前とは裏腹に、彼は実はとても穏やかです。" },
      { en: "Despite the name, this café serves amazing food.", ja: "名前に反して、このカフェの料理は絶品です。" },
      { en: "Despite the name 'beginner course', it was quite challenging.", ja: "「初心者コース」という名前に反して、かなり難しかった。" },
      { en: "Despite the name, the 'Small Bites' restaurant has huge portions.", ja: "名前とは裏腹に、そのレストランの量はとても多い。" },
      { en: "Despite the name, the 'Quiet Corner' café is always packed.", ja: "名前とは裏腹に、そのカフェはいつも混んでいる。" },
      { en: "Despite the name, the 'Easy Trail' was exhausting.", ja: "名前に反して、その「楽々コース」はとてもきつかった。" },
      { en: "Despite the name, he's a very experienced teacher.", ja: "名前からは想像できないが、彼はとても経験豊富な先生だ。" },
      { en: "Despite the name, the product works really well.", ja: "名前とは裏腹に、その製品はとてもよく機能する。" },
      { en: "Despite the name, this isn't a children's book at all.", ja: "名前に反して、これは全く子ども向けの本ではない。" },
      { en: "Despite the name, the 'lightning service' took three hours.", ja: "「迅速サービス」という名前に反して、3時間かかった。" }
    ]
  },
  {
    phrase: "timid",
    meaning: "臆病な / 内気な / おとなしい",
    category: "性格・感情",
    examples: [
      { en: "She was too timid to speak up at the meeting.", ja: "彼女は内気すぎて会議で発言できなかった。" },
      { en: "Don't be timid — just go and introduce yourself.", ja: "臆病にならないで、行って自己紹介してきなよ。" },
      { en: "The new employee seemed a bit timid at first.", ja: "新しい社員は最初、少し内気に見えた。" },
      { en: "He used to be timid, but he's very confident now.", ja: "彼は以前は臆病だったが、今はとても自信がある。" },
      { en: "The timid child hid behind his mother.", ja: "内気な子どもは母親の後ろに隠れた。" },
      { en: "Even timid people can become great leaders.", ja: "内気な人でも、すばらしいリーダーになれる。" },
      { en: "She felt timid about asking for a raise.", ja: "彼女は昇給のお願いをするのが怖かった。" },
      { en: "The kitten was too timid to come out from under the bed.", ja: "子猫は臆病すぎてベッドの下から出てこられなかった。" },
      { en: "His timid voice made it hard to hear him.", ja: "彼の小さな声は聞き取りにくかった。" },
      { en: "I was timid about traveling alone, but it was worth it.", ja: "一人旅は怖かったが、やってみてよかった。" }
    ]
  },
  {
    phrase: "clingy",
    meaning: "べったりくっつく / 甘えん坊な / 離れたがらない",
    category: "性格・感情",
    examples: [
      { en: "My little sister is really clingy when she's tired.", ja: "妹は疲れているとき、本当にべったりくっついてくる。" },
      { en: "He gets clingy whenever I try to go out alone.", ja: "私が一人で出かけようとすると、彼はいつもべったりしてくる。" },
      { en: "Some cats are clingy and follow you everywhere.", ja: "べったり甘える猫は、どこへでもついてくる。" },
      { en: "The baby is very clingy today — she won't let me put her down.", ja: "赤ちゃんは今日とても甘えん坊で、降ろすと泣く。" },
      { en: "My dog is so clingy that he follows me to the bathroom.", ja: "うちの犬はとてもべったりで、トイレまでついてくる。" },
      { en: "She tends to be a bit clingy in new relationships.", ja: "彼女は新しい恋愛ではちょっと依存しがちだ。" },
      { en: "Don't be so clingy — give them some space.", ja: "そんなにべったりしないで、少し距離を置いてあげて。" },
      { en: "Kids often become clingy when they feel insecure.", ja: "子どもは不安を感じると、べったり甘えてくることが多い。" },
      { en: "He becomes clingy whenever I'm about to leave.", ja: "私が出かけようとするたびに、彼はべったりしてくる。" },
      { en: "The puppy was incredibly clingy on its first day home.", ja: "その子犬は家に来た初日、信じられないくらいべったりだった。" }
    ]
  },
  {
    phrase: "can't stand -ing",
    meaning: "〜に耐えられない / 〜が我慢できない",
    category: "感情・好み",
    examples: [
      { en: "I can't stand waiting in long lines.", ja: "長い行列で待つのが我慢できません。" },
      { en: "She can't stand the smell of cigarettes.", ja: "彼女はタバコの匂いに耐えられない。" },
      { en: "He can't stand being ignored.", ja: "彼は無視されることが我慢できない。" },
      { en: "I can't stand eating breakfast alone.", ja: "一人で朝食をとるのが嫌でたまらない。" },
      { en: "She can't stand people who are always late.", ja: "彼女はいつも遅刻する人が我慢できない。" },
      { en: "I can't stand the sound of nails on a chalkboard.", ja: "黒板をひっかく音に耐えられない。" },
      { en: "He can't stand working overtime every week.", ja: "毎週残業するのが我慢できない。" },
      { en: "I can't stand it when people talk during movies.", ja: "映画中に話している人が我慢できない。" },
      { en: "She can't stand feeling left out.", ja: "彼女は仲間外れにされる感覚に耐えられない。" },
      { en: "I can't stand not knowing what will happen next.", ja: "次に何が起こるかわからない状態に耐えられない。" }
    ]
  },
  {
    phrase: "check in on ~",

function shuffle(a) {
  let arr=[...a];
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function updateStats() {
  document.getElementById("s-total").textContent = S.total;
  document.getElementById("s-ok").textContent = S.correct;
  document.getElementById("s-ng").textContent = S.wrong.length;
  const b = document.getElementById("rbadge");
  if(S.wrong.length>0){b.style.display="";b.textContent=S.wrong.length;}
  else b.style.display="none";
}

function switchMode(m) {
  S.mode = m;
  ["practice","vocab","review"].forEach(id => {

    document.getElementById("tab-"+id).classList.toggle("active", m===id);
  });
  if(m==="vocab") renderVocab();
  if(m==="review") renderReview();
}

function getFilteredQ() {
  return S.cat==="全て"?[...QUESTIONS]:QUESTIONS.filter(q=>q.cat===S.cat);
}

function initPractice() {
  S.qs = shuffle(getFilteredQ());
  S.idx = 0;
  S.flipped = false;
  showCard();
}

function renderCats() {
  document.getElementById("cat-row").innerHTML = CATEGORIES.map(c =>
    `<button class="cat-btn ${c===S.cat?'active':''}" onclick="selectCat('${c.replace(/'/g,"\\'")}')"> ${c}</button>`
  ).join("");
}

function selectCat(c) { S.cat=c; renderCats(); initPractice(); }

function showCard() {
  const qs = S.qs;
  if(!qs.length) {
    document.getElementById("card-counter").textContent = "";
    document.getElementById("ja-text").textContent = "この分類の問題がありません";
    document.getElementById("hint-row").innerHTML = "";
    document.getElementById("judge-buttons").classList.remove("visible");
    return;
  }
  if(S.idx >= qs.length) { showResult(); return; }

  const q = qs[S.idx];
  const pct = Math.round(S.idx / qs.length * 100);
  document.getElementById("prog").style.width = pct+"%";
  document.getElementById("card-counter").textContent = (S.idx+1) + " / " + qs.length;

  // Reset flip
  const fc = document.getElementById("flip-card");
  fc.classList.remove("flipped");
  S.flipped = false;
  document.getElementById("judge-buttons").classList.remove("visible");

  // Front
  document.getElementById("ja-text").textContent = q.ja;
  document.getElementById("hint-row").innerHTML = q.hint.map(h=>`<span class="hint-chip">🔑 ${h}</span>`).join("");

  // Back
  document.getElementById("en-text").textContent = q.en;
  document.getElementById("alt-text").textContent = q.alt ? "別解: "+q.alt : "";
  document.getElementById("key-tag").textContent = "📌 "+q.key;
  document.getElementById("info-text").textContent = q.info || "";
}

function flipCard() {
  if(S.idx >= S.qs.length) return;
  const fc = document.getElementById("flip-card");
  S.flipped = !S.flipped;
  fc.classList.toggle("flipped", S.flipped);
  if(S.flipped) {
    setTimeout(()=>{ document.getElementById("judge-buttons").classList.add("visible"); }, 200);
  } else {
    document.getElementById("judge-buttons").classList.remove("visible");
  }
}

function judge(ok) {
  if(!S.flipped) return;
  const q = S.qs[S.idx];
  S.total++;
  if(ok) {
    S.correct++;
    S.wrong = S.wrong.filter(w=>w.ja!==q.ja);
  } else {
    if(!S.wrong.find(w=>w.ja===q.ja)) S.wrong.push(q);
  }
  updateStats();
  S.idx++;
  S.flipped = false;

  // Brief flash animation
  const fc = document.getElementById("flip-card");
  fc.style.transition = "none";
  fc.classList.remove("flipped");
  document.getElementById("judge-buttons").classList.remove("visible");
  setTimeout(()=>{
    fc.style.transition = "";
    showCard();
  }, 60);
}

function showResult() {
  document.getElementById("prog").style.width = "100%";
  document.getElementById("card-counter").textContent = "完了！";
  document.getElementById("judge-buttons").classList.remove("visible");

  const pct = S.total>0 ? Math.round(S.correct/S.total*100) : 0;
  const emoji = pct>=80?"🎉":pct>=50?"💪":"📚";
  const msg = pct>=80?"素晴らしい！Cocoも大喜び🐾":pct>=50?"いい調子！もう少し頑張ろう！":"繰り返しが力になる！続けよう！";

  // Replace flip card area with result
  document.getElementById("flip-card").outerHTML = `<div id="flip-card"></div>`;
  document.querySelector(".flip-scene").innerHTML = `
    <div class="result-screen">
      <div class="result-emoji">${emoji}</div>
      <div class="result-pct">${pct}%</div>
      <div class="result-msg">${msg}</div>
      <div class="result-nums">
        <div><div class="r-num ok">${S.correct}</div><div class="r-lbl">できた</div></div>
        <div><div class="r-num ng">${S.wrong.length}</div><div class="r-lbl">要復習</div></div>
      </div>
      <div class="result-btns">
        <button class="btn-result primary" onclick="location.reload()">もう一度最初から 🔄</button>
        ${S.wrong.length>0?`<button class="btn-result amber" onclick="startWrongPractice()">間違いだけ集中練習 🔁</button>`:""}
      </div>
    </div>
  `;
}

function startWrongPractice() {
  // Rebuild DOM for practice
  document.querySelector(".flip-scene").innerHTML = `
    <div class="flip-card" id="flip-card" onclick="flipCard()">
      <div class="card-face card-front" id="card-front">
        <div class="face-label">日本語を見て英語で言おう</div>
        <div class="ja-text" id="ja-text"></div>
        <div class="hint-row" id="hint-row"></div>
        <div class="tap-hint"><span class="tap-icon">👆</span> タップで英語を確認</div>
      </div>
      <div class="card-face card-back" id="card-back">
        <div class="face-label">Answer</div>
        <div class="en-text" id="en-text"></div>
        <div class="alt-text" id="alt-text"></div>
        <div class="key-tag" id="key-tag"></div>
        <div class="info-text" id="info-text"></div>
      </div>
    </div>
  `;
  S.qs = shuffle([...S.wrong]);
  S.idx = 0;
  S.flipped = false;
  showCard();
}

// Vocab
function renderVocab() {
  document.getElementById("vocab-list").innerHTML = VOCAB.map(v=>`
    <div class="vocab-card">
      <div class="vocab-phrase">${v.phrase}</div>
      <div class="vocab-cat">${v.category}</div>
      <div class="vocab-meaning">🇯🇵 ${v.meaning}</div>
      <div class="vocab-examples">
        ${v.examples.map(e=>`
          <div class="ex-item">
            <div class="ex-en">${e.en}</div>
            <div class="ex-ja">${e.ja}</div>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");
}

// Review
function renderReview() {
  const area = document.getElementById("review-list");
  if(!S.wrong.length) {
    area.innerHTML=`<div class="empty-state"><div class="ee">🎊</div><p>要復習の問題はありません！<br>全問マスターしました！</p></div>`;
    return;
  }
  area.innerHTML = `
    <div style="font-size:13px;color:var(--text-hint);margin-bottom:12px">${S.wrong.length}問 要復習</div>
    ${S.wrong.map((q,i)=>`
      <div class="review-item">
        <div class="ri-ja">${q.ja}</div>
        <div class="ri-en">→ ${q.en}</div>
        <span class="ri-key">📌 ${q.key}</span>
        <div class="ri-actions">
          <button class="btn-sm green" onclick="markMastered(${i})">✓ 覚えた</button>
          <button class="btn-sm gray" onclick="practiceThis(${i})">練習する →</button>
        </div>
      </div>
    `).join("")}
    <div style="margin-top:16px">
      <button class="btn-result primary" style="width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;color:#fff;background:var(--green);font-family:'Noto Sans JP',sans-serif" onclick="startWrongAndSwitch()">全ての要復習をフリップ練習 🔁</button>
    </div>
  `;
}

function markMastered(i) { S.wrong.splice(i,1); updateStats(); renderReview(); }

function practiceThis(i) {
  S.qs = [S.wrong[i]];
  S.idx = 0;
  S.flipped = false;
  switchMode("practice");
  renderCats();
  showCard();
}

function startWrongAndSwitch() {
  switchMode("practice");
  startWrongPractice();
}

// Init
renderCats();
initPractice();
updateStats();
</script>
</body>
</html>
