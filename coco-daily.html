<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoCo's Daily Life English</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1410;--paper:#f5f0e8;--gold:#c8962a;--moss:#4a7c59;--indigo:#3d5a8a;--crimson:#a03030;--panel:#fffdf8;--border:rgba(26,20,16,0.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
header{background:var(--ink);padding:18px 20px 0;position:sticky;top:0;z-index:100;}
.h-top{display:flex;align-items:center;gap:10px;padding-bottom:14px;}
.h-top h1{font-family:'Shippori Mincho',serif;color:var(--gold);font-size:17px;font-weight:700;flex:1;}
.h-top p{color:rgba(245,240,232,0.45);font-size:10px;margin-top:1px;}
.badge{background:rgba(200,150,42,0.2);border:1px solid var(--gold);color:var(--gold);font-size:10px;padding:3px 8px;border-radius:20px;white-space:nowrap;}
nav{display:flex;}
.tab{flex:1;padding:9px 4px;background:none;border:none;border-bottom:2px solid transparent;color:rgba(245,240,232,0.38);font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab span:first-child{font-size:14px;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
main{padding:14px;max-width:600px;margin:0 auto;}
.page{display:none;}.page.active{display:block;}
.sec{font-family:'Shippori Mincho',serif;font-size:10px;font-weight:600;color:rgba(26,20,16,0.38);letter-spacing:.12em;text-transform:uppercase;margin:18px 0 10px;}

/* CONVERSATION */
.schips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.schip{padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--panel);font-size:11px;cursor:pointer;transition:all 0.2s;color:var(--ink);}
.schip.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:9px 12px;background:var(--panel);border:1px solid var(--border);border-radius:10px;}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(26,20,16,0.52);}
.leg-dot{width:9px;height:9px;border-radius:2px;}
.conv-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 10px rgba(26,20,16,0.05);}
.conv-hd{background:var(--ink);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.conv-lbl{font-size:11px;color:rgba(245,240,232,0.5);}
.conv-num{font-size:11px;color:var(--gold);font-weight:500;}
.conv-body{padding:14px;}
.line{display:flex;gap:9px;margin-bottom:13px;align-items:flex-start;}
.line:last-child{margin-bottom:0;}
.sp{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px;}
.sp.me{background:rgba(200,150,42,0.15);}.sp.them{background:rgba(74,124,89,0.15);}
.bbl{flex:1;}
.en{font-size:14px;font-weight:400;line-height:1.6;margin-bottom:3px;}
.jp{font-family:'Shippori Mincho',serif;font-size:11px;color:rgba(26,20,16,0.42);font-style:italic;line-height:1.5;}
.hl{cursor:pointer;border-radius:3px;padding:0 2px;transition:opacity .15s;}
.hl:hover{opacity:.72;}
.hl.g{background:rgba(200,150,42,0.18);border-bottom:1.5px solid var(--gold);}
.hl.m{background:rgba(74,124,89,0.15);border-bottom:1.5px solid var(--moss);}
.hl.i{background:rgba(61,90,138,0.15);border-bottom:1.5px solid var(--indigo);}

/* FLIP CARDS (phrase) */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px;}
.sb{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:11px 7px;text-align:center;}
.sn{font-size:20px;font-weight:500;line-height:1;margin-bottom:3px;}
.sn.g{color:var(--gold);}.sn.m{color:var(--moss);}.sn.k{color:var(--ink);}
.sl{font-family:'Shippori Mincho',serif;font-size:9px;color:rgba(26,20,16,0.4);}
.fchips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.fc{padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--panel);font-size:10px;cursor:pointer;transition:all 0.2s;color:var(--ink);}
.fc.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.ctr{font-size:11px;color:rgba(26,20,16,0.4);}
.pw{flex:1;height:4px;background:var(--border);border-radius:2px;margin:0 10px;overflow:hidden;}
.pf{height:100%;background:var(--moss);border-radius:2px;transition:width .3s;}
.rst{font-size:10px;color:rgba(26,20,16,0.35);background:none;border:none;cursor:pointer;text-decoration:underline;}
.fcs{perspective:1000px;margin-bottom:14px;cursor:pointer;min-height:200px;}
.fci{position:relative;transition:transform .5s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;min-height:200px;}
.fcs.flipped .fci{transform:rotateY(180deg);}
.ff,.fb{position:absolute;width:100%;min-height:200px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:22px 18px;backface-visibility:hidden;box-shadow:0 3px 18px rgba(26,20,16,0.07);}
.fb{transform:rotateY(180deg);}
.mpill{position:absolute;top:12px;right:12px;background:var(--moss);color:#fff;font-size:9px;padding:2px 8px;border-radius:20px;}
.cjp{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:600;line-height:1.55;margin-bottom:8px;}
.chint{font-size:10px;color:rgba(26,20,16,0.35);font-style:italic;}
.cen{font-size:15px;font-weight:500;line-height:1.5;margin-bottom:6px;}
.cnote{font-family:'Shippori Mincho',serif;font-size:11px;color:rgba(26,20,16,0.52);line-height:1.65;margin-bottom:12px;}
.cact{display:flex;gap:8px;}
.cb{flex:1;padding:10px;border-radius:9px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s;}
.cb:hover{opacity:.85;}
.cb.r{background:rgba(160,48,48,0.1);color:var(--crimson);}
.cb.ok{background:var(--moss);color:#fff;}
.cnav{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.nb{padding:9px 18px;border-radius:9px;border:1.5px solid var(--border);background:var(--panel);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;color:var(--ink);}
.nb:hover{border-color:var(--ink);}
.nb:disabled{opacity:.25;cursor:default;}

/* ===== DRILL — FLIP CARD STYLE ===== */
.word-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.ws-btn{padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--panel);font-size:11px;cursor:pointer;transition:all .2s;color:var(--ink);}
.ws-btn.active{background:var(--indigo);color:#fff;border-color:var(--indigo);}

.construct-box{background:var(--ink);border-radius:14px;padding:14px 18px;margin-bottom:8px;}
.construct-en{font-size:17px;font-weight:500;color:var(--gold);margin-bottom:3px;}
.construct-jp{font-family:'Shippori Mincho',serif;font-size:11px;color:rgba(245,240,232,0.5);}

.usage-note{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-family:'Shippori Mincho',serif;font-size:12px;line-height:1.75;color:rgba(26,20,16,0.62);}
.usage-note strong{color:var(--indigo);}

.drill-prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.drill-ctr{font-size:11px;color:rgba(26,20,16,0.4);}
.drill-pw{flex:1;height:4px;background:var(--border);border-radius:2px;margin:0 10px;overflow:hidden;}
.drill-pf{height:100%;background:var(--indigo);border-radius:2px;transition:width .35s;}
.drill-rst{font-size:10px;color:rgba(26,20,16,0.35);background:none;border:none;cursor:pointer;text-decoration:underline;}

/* drill flip card */
.dfc-scene{perspective:1000px;margin-bottom:14px;cursor:pointer;min-height:230px;}
.dfc-inner{position:relative;transition:transform .48s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;min-height:230px;}
.dfc-scene.flipped .dfc-inner{transform:rotateY(180deg);}
.dfc-front,.dfc-back{position:absolute;width:100%;min-height:230px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px 20px;backface-visibility:hidden;box-shadow:0 3px 18px rgba(26,20,16,0.07);}
.dfc-back{transform:rotateY(180deg);}

.dfc-num-badge{display:inline-block;font-size:10px;font-weight:600;color:rgba(26,20,16,0.3);letter-spacing:.07em;margin-bottom:14px;}
.done-pill{font-size:9px;background:var(--moss);color:#fff;padding:2px 8px;border-radius:20px;margin-left:8px;display:none;}

.dfc-jp{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:600;line-height:1.65;margin-bottom:12px;}
.dfc-hint{font-size:10px;color:rgba(26,20,16,0.35);font-style:italic;}

.dfc-en{font-size:15px;font-weight:500;line-height:1.55;margin-bottom:8px;padding:10px 12px;background:rgba(74,124,89,0.07);border-radius:8px;border-left:3px solid var(--moss);}
.dfc-key{font-size:11px;color:var(--indigo);font-weight:500;margin-bottom:14px;}
.dfc-acts{display:flex;gap:8px;}
.dfc-btn{flex:1;padding:10px;border-radius:9px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s;}
.dfc-btn:hover{opacity:.85;}
.dfc-btn.retry{background:rgba(160,48,48,0.1);color:var(--crimson);}
.dfc-btn.got{background:var(--moss);color:#fff;}

.drill-nav{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.dnb{padding:9px 18px;border-radius:9px;border:1.5px solid var(--border);background:var(--panel);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;color:var(--ink);}
.dnb:hover{border-color:var(--ink);}
.dnb:disabled{opacity:.25;cursor:default;}

.all-done-msg{text-align:center;padding:30px 20px;font-family:'Shippori Mincho',serif;color:rgba(26,20,16,0.5);font-size:14px;line-height:2;}

/* POPUP */
.overlay{position:fixed;inset:0;background:rgba(26,20,16,0.52);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(3px);}
.overlay.open{display:flex;}
.popup{background:var(--panel);width:100%;max-width:600px;margin:0 auto;border-radius:18px 18px 0 0;padding:0 0 32px;animation:su .28s cubic-bezier(.22,1,.36,1);}
@keyframes su{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.ph{width:34px;height:4px;background:rgba(26,20,16,0.13);border-radius:2px;margin:11px auto 0;}
.pt{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 11px;border-bottom:1px solid var(--border);}
.ptype{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
.ptype.g{background:rgba(200,150,42,0.15);color:var(--gold);}
.ptype.m{background:rgba(74,124,89,0.12);color:var(--moss);}
.ptype.i{background:rgba(61,90,138,0.12);color:var(--indigo);}
.pcls{width:26px;height:26px;border-radius:50%;border:none;background:rgba(26,20,16,0.07);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--ink);}
.pc{padding:14px 18px;}
.pp{font-size:17px;font-weight:500;margin-bottom:7px;line-height:1.4;}
.pb{font-family:'Shippori Mincho',serif;font-size:12px;line-height:1.78;color:rgba(26,20,16,0.7);margin-bottom:12px;}
.pvs{background:rgba(26,20,16,0.04);border:1px solid var(--border);border-radius:9px;padding:11px 13px;margin-bottom:12px;font-size:12px;line-height:1.75;}
.pvs .ok{color:var(--moss);font-weight:500;}
.pvs .ng{color:var(--crimson);font-weight:500;}
.mbtn{width:100%;padding:11px;border-radius:9px;border:1.5px solid var(--moss);background:none;color:var(--moss);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
.mbtn.done{background:var(--moss);color:#fff;}
</style>
</head>
<body>
<header>
  <div class="h-top">
    <span style="font-size:26px">🐾</span>
    <div style="flex:1">
      <h1>CoCo's Daily Life English</h1>
      <p>日常の仕草・気持ちを英語で伝えよう</p>
    </div>
    <span class="badge">Cavoodle · 5y</span>
  </div>
  <nav>
    <button class="tab active" onclick="switchTab('conv',this)"><span>💬</span><span>会話</span></button>
    <button class="tab" onclick="switchTab('flip',this)"><span>🔄</span><span>瞬間英作文</span></button>
    <button class="tab" onclick="switchTab('drill',this)"><span>📖</span><span>構文ドリル</span></button>
  </nav>
</header>
<main>

<!-- CONVERSATION -->
<div id="page-conv" class="page active">
  <div class="sec" style="margin-top:14px">シーンを選ぶ</div>
  <div class="schips">
    <button class="schip active" onclick="filterScene('all',this)">すべて</button>
    <button class="schip" onclick="filterScene('leaving',this)">🚪 外出前</button>
    <button class="schip" onclick="filterScene('daily',this)">☀️ 日常</button>
    <button class="schip" onclick="filterScene('sleep',this)">🌙 就寝</button>
    <button class="schip" onclick="filterScene('walk',this)">🦮 散歩</button>
    <button class="schip" onclick="filterScene('alone',this)">🏠 留守番</button>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--gold)"></div>🏅 重要フレーズ</div>
    <div class="leg"><div class="leg-dot" style="background:var(--moss)"></div>💬 便利表現</div>
    <div class="leg"><div class="leg-dot" style="background:var(--indigo)"></div>📖 語彙</div>
  </div>
  <div id="conv-list"></div>
</div>

<!-- PHRASE FLIP -->
<div id="page-flip" class="page">
  <div class="sec" style="margin-top:14px">進捗</div>
  <div class="stats" id="stats"></div>
  <div class="fchips">
    <button class="fc active" onclick="filterCards('all',this)">すべて</button>
    <button class="fc" onclick="filterCards('leaving',this)">🚪 外出前</button>
    <button class="fc" onclick="filterCards('daily',this)">☀️ 日常</button>
    <button class="fc" onclick="filterCards('sleep',this)">🌙 就寝</button>
    <button class="fc" onclick="filterCards('walk',this)">🦮 散歩</button>
    <button class="fc" onclick="filterCards('unmastered',this)">🔄 未習得</button>
  </div>
  <div class="prog-row">
    <span class="ctr" id="ctr">カード 1/1</span>
    <div class="pw"><div class="pf" id="pf" style="width:0%"></div></div>
    <button class="rst" onclick="resetFlip()">リセット</button>
  </div>
  <div class="fcs" id="fcs" onclick="flipCard()">
    <div class="fci" id="fci"><div class="ff" id="ff"></div><div class="fb" id="fb"></div></div>
  </div>
  <div class="cnav">
    <button class="nb" id="bp" onclick="prevCard()">← 前へ</button>
    <button class="nb" id="bn" onclick="nextCard()">次へ →</button>
  </div>
</div>

<!-- DRILL -->
<div id="page-drill" class="page">
  <div class="sec" style="margin-top:14px">構文を選ぶ</div>
  <div class="word-selector" id="word-selector"></div>
  <div id="drill-area"></div>
</div>

</main>

<!-- POPUP -->
<div class="overlay" id="overlay" onclick="cpbg(event)">
  <div class="popup">
    <div class="ph"></div>
    <div class="pt"><span class="ptype" id="ptype"></span><button class="pcls" onclick="cp()">✕</button></div>
    <div class="pc">
      <div class="pp" id="pp"></div>
      <div class="pb" id="pb"></div>
      <div class="pvs" id="pvs"></div>
      <button class="mbtn" id="mbtn" onclick="toggleM()">✓ 習得済みにする</button>
    </div>
  </div>
</div>

<script>
// ── PHRASE DATA ──────────────────────────────────────────────
const PD={
  sense_diff:{cat:'leaving',type:'🏅 重要フレーズ',category:'g',emoji:'🚪',jp:'仕事と遊びの外出を感覚的に分かっている',phrase:'She can somehow tell the difference between work and play.',note:'can tell the difference は「違いが分かる」。somehow で「なぜか・不思議と」というニュアンスが出ます。',vs:'<span class="ok">✅ She can tell the difference between work and play.</span><br><span class="ng">❌ She understands the difference of work and play.</span>',meaning:'なぜか違いが分かる',ex:'She can somehow tell the difference between work and play!'},
  hold_back:{cat:'leaving',type:'🏅 重要フレーズ',category:'g',emoji:'🚪',jp:'全力で私を引き止めようとする',phrase:'She tries so hard to stop me from leaving.',note:'stop A from -ing は「Aが〜するのを止める」。try so hard で「全力で試みる」という必死さが伝わります。',vs:'<span class="ok">✅ She tries so hard to stop me from leaving.</span><br><span class="ng">❌ She tries to not let me go out.</span>',meaning:'全力で行かせまいとする',ex:'She tries so hard to stop me from leaving — it breaks my heart!'},
  jumps_on_lap:{cat:'leaving',type:'💬 便利表現',category:'m',emoji:'🚪',jp:'膝の上にひょいっと乗ってくる',phrase:'She jumps onto my lap as if to say "don\'t go."',note:'as if to say ... は「〜と言わんばかりに」。犬の気持ちを言葉に乗せるときに使えます。',vs:'<span class="ok">✅ She jumps onto my lap as if to say "don\'t leave."</span><br><span class="ng">❌ She jumps on me because she doesn\'t want me to go.</span>',meaning:'「行かないで」と言わんばかりに膝に乗る',ex:'She jumps onto my lap as if to say "don\'t go" — melts my heart!'},
  separation_anxiety:{cat:'leaving',type:'📖 語彙',category:'i',emoji:'🚪',jp:'分離不安・一人になるとパニックになる',phrase:'She has separation anxiety when I\'m away.',note:'separation anxiety は分離不安の正式名称。英語圏でも広く認知されている言葉です。',vs:'<span class="ok">✅ She has separation anxiety — she panics when I\'m gone.</span><br><span class="ng">❌ She gets nervous and panics when she is alone.</span>',meaning:'分離不安',ex:'Cavoodles can have separation anxiety, so I use a dog camera.'},
  eyes_follow:{cat:'daily',type:'🏅 重要フレーズ',category:'g',emoji:'☀️',jp:'私が動くたびに目がパチッとあく',phrase:'Her eyes snap open every time I move.',note:'snap open は「パチッと開く」。every time I move で「私が動くたびに」。',vs:'<span class="ok">✅ Her eyes snap open the moment I move.</span><br><span class="ng">❌ Her eyes open quickly when I move.</span>',meaning:'動くたびに目がパチッと開く',ex:'Her eyes snap open every time I move — the world\'s lightest sleeper!'},
  head_toward_me:{cat:'daily',type:'💬 便利表現',category:'m',emoji:'☀️',jp:'寝ていても頭だけ私の方に向けている',phrase:'Even when she\'s asleep, her head is always turned toward me.',note:'even when ... は「〜していても」という譲歩表現。turned toward me で状態を描写。',vs:'<span class="ok">✅ Even when asleep, her head is turned toward me.</span><br><span class="ng">❌ She sleeps but her face looks at me direction.</span>',meaning:'寝ていても私の方を向いている',ex:'Even when napping, her head is always turned toward me — my little stalker!'},

  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  btn.classList.add('active');
  if(p==='flip') renderCards();
  if(p==='drill') renderDrillPage();
}

// ── CONVERSATION ─────────────────────────────────────────────
function filterScene(scene,btn){
  document.querySelectorAll('.schip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderConv(scene);
}
function renderConv(scene='all'){
  const data=scene==='all'?CONVS:CONVS.filter(c=>c.scene===scene);
  document.getElementById('conv-list').innerHTML=data.map((c,i)=>`
    <div class="conv-card">
      <div class="conv-hd"><span class="conv-lbl">${c.label}</span><span class="conv-num">#${i+1}</span></div>
      <div class="conv-body">${c.lines.map(l=>`
        <div class="line">
          <div class="sp ${l.sp}">${l.sp==='me'?'🙋':'👤'}</div>
          <div class="bbl"><div class="en">${l.en}</div><div class="jp">${l.jp}</div></div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}

// ── PHRASE FLIP CARDS ────────────────────────────────────────
function filterCards(type,btn){
  document.querySelectorAll('.fc').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  if(type==='all') flipFiltered=Object.keys(PD);
  else if(type==='unmastered') flipFiltered=Object.keys(PD).filter(k=>!mastered.has(k));
  else flipFiltered=Object.keys(PD).filter(k=>PD[k].cat===type);
  flipIdx=0; flipped=false;
  document.getElementById('fcs').classList.remove('flipped');
  renderCards();
}
function renderCards(){
  const total=flipFiltered.length;
  const m=[...mastered].filter(k=>PD[k]).length;
  document.getElementById('stats').innerHTML=`
    <div class="sb"><div class="sn g">${Object.keys(PD).length}</div><div class="sl">総フレーズ</div></div>
    <div class="sb"><div class="sn m">${m}</div><div class="sl">習得済み</div></div>
    <div class="sb"><div class="sn k">${Object.keys(PD).length-m}</div><div class="sl">学習中</div></div>`;
  if(total===0){document.getElementById('ff').innerHTML='<div style="padding:20px;text-align:center;font-family:Shippori Mincho,serif;color:rgba(26,20,16,0.4)">カードがありません</div>';return;}
  if(flipIdx>=total) flipIdx=total-1;
  const k=flipFiltered[flipIdx]; const d=PD[k]; const isMastered=mastered.has(k);
  const mf=[...mastered].filter(x=>flipFiltered.includes(x)).length;
  document.getElementById('ctr').textContent=`カード ${flipIdx+1} / ${total}`;
  document.getElementById('pf').style.width=(mf/total*100)+'%';
  document.getElementById('ff').innerHTML=`${isMastered?'<span class="mpill">✓ 習得済み</span>':''}<span style="font-size:36px;display:block;margin-bottom:12px">${d.emoji}</span><div class="cjp">${d.jp}</div><div class="chint">タップして英語を確認 →</div>`;
  document.getElementById('fb').innerHTML=`${isMastered?'<span class="mpill">✓ 習得済み</span>':''}<div class="cen">${d.phrase}</div><div class="cnote">${d.meaning} — ${d.ex}</div><div class="cact"><button class="cb r" onclick="retryC(event)">✕ もう一度</button><button class="cb ok" onclick="markG(event,'${k}')">✓ 覚えた！</button></div>`;
  document.getElementById('bp').disabled=flipIdx===0;
  document.getElementById('bn').disabled=flipIdx===total-1;
}
function flipCard(){flipped=!flipped;document.getElementById('fcs').classList.toggle('flipped');}
function prevCard(){if(flipIdx>0){flipIdx--;flipped=false;document.getElementById('fcs').classList.remove('flipped');renderCards();}}
function nextCard(){if(flipIdx<flipFiltered.length-1){flipIdx++;flipped=false;document.getElementById('fcs').classList.remove('flipped');renderCards();}}
function retryC(e){e.stopPropagation();flipped=false;document.getElementById('fcs').classList.remove('flipped');}
function markG(e,k){e.stopPropagation();mastered.add(k);saveM();setTimeout(()=>{flipped=false;document.getElementById('fcs').classList.remove('flipped');if(flipIdx<flipFiltered.length-1)flipIdx++;renderCards();},280);}
function resetFlip(){mastered.clear();saveM();flipIdx=0;flipped=false;document.getElementById('fcs').classList.remove('flipped');renderCards();}

// ── DRILL (FLIP CARD STYLE) ──────────────────────────────────
function renderDrillPage(){
  document.getElementById('word-selector').innerHTML=DRILLS.map(d=>`
    <button class="ws-btn ${d.id===currentDrillId?'active':''}" onclick="selectDrill('${d.id}',this)">${d.label}</button>`).join('');
  renderDrillCard();
}

function selectDrill(id,btn){
  currentDrillId=id;
  document.querySelectorAll('.ws-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDrillCard();
}

function renderDrillCard(){
  const d=DRILLS.find(x=>x.id===currentDrillId);
  const st=drillState[d.id];
  const total=d.examples.length;
  const doneCount=st.done.size;
  const idx=st.idx;
  const ex=d.examples[idx];
  const isDone=st.done.has(idx);

  document.getElementById('drill-area').innerHTML=`
    <div class="construct-box">
      <div class="construct-en">${d.construct}</div>
      <div class="construct-jp">${d.meaning}</div>
    </div>
    <div class="usage-note">${d.note}</div>

    <div class="drill-prog-row">
      <span class="drill-ctr">例文 ${idx+1} / ${total}</span>
      <div class="drill-pw"><div class="drill-pf" style="width:${doneCount/total*100}%"></div></div>
      <button class="drill-rst" onclick="drillReset('${d.id}')">リセット</button>
    </div>

    <div class="dfc-scene ${st.flipped?'flipped':''}" id="dfc" onclick="drillFlip()">
      <div class="dfc-inner">
        <div class="dfc-front">
          <div class="dfc-num-badge">例文 ${idx+1} / ${total}${isDone?'<span class="done-pill" style="display:inline">✓ OK</span>':''}</div>
          <div class="dfc-jp">${ex.jp}</div>
          <div class="dfc-hint">タップして英語を確認 →</div>
        </div>
        <div class="dfc-back">
          <div class="dfc-num-badge">例文 ${idx+1} / ${total}${isDone?'<span class="done-pill" style="display:inline">✓ OK</span>':''}</div>
          <div class="dfc-en">${ex.en}</div>
          <div class="dfc-key">🔑 ${ex.key}</div>
          <div class="dfc-acts">
            <button class="dfc-btn retry" onclick="drillRetry(event,'${d.id}')">✕ もう一度</button>
            <button class="dfc-btn got"   onclick="drillGot(event,'${d.id}',${idx})">✓ できた！</button>
          </div>
        </div>
      </div>
    </div>

    <div class="drill-nav">
      <button class="dnb" ${idx===0?'disabled':''} onclick="drillPrev('${d.id}')">← 前へ</button>
      <button class="dnb" ${idx===total-1?'disabled':''} onclick="drillNext('${d.id}')">次へ →</button>
    </div>

    ${doneCount===total?`<div class="all-done-msg">🎉 全 ${total} 問完了！<br>素晴らしい！</div>`:''}
  `;
}

function drillFlip(){
  const st=drillState[currentDrillId];
  st.flipped=!st.flipped;
  const el=document.getElementById('dfc');
  if(el) el.classList.toggle('flipped');
}

function drillRetry(e,id){
  e.stopPropagation();
  drillState[id].flipped=false;
  const el=document.getElementById('dfc');
  if(el) el.classList.remove('flipped');
}

function drillGot(e,id,idx){
  e.stopPropagation();
  drillState[id].done.add(idx);
  saveDone(id);
  drillState[id].flipped=false;
  const total=DRILLS.find(x=>x.id===id).examples.length;
  if(idx<total-1) drillState[id].idx=idx+1;
  renderDrillCard();
}

function drillPrev(id){
  if(drillState[id].idx>0){drillState[id].idx--;drillState[id].flipped=false;renderDrillCard();}
}
function drillNext(id){
  const total=DRILLS.find(x=>x.id===id).examples.length;
  if(drillState[id].idx<total-1){drillState[id].idx++;drillState[id].flipped=false;renderDrillCard();}
}
function drillReset(id){
  drillState[id].done.clear();drillState[id].idx=0;drillState[id].flipped=false;
  saveDone(id);renderDrillCard();
}

// ── POPUP ────────────────────────────────────────────────────
function openPopup(key){
  const d=PD[key];if(!d)return;currentKey=key;
  document.getElementById('ptype').textContent=d.type;
  document.getElementById('ptype').className='ptype '+d.category;
  document.getElementById('pp').textContent=d.phrase;
  document.getElementById('pb').textContent=d.note;
  document.getElementById('pvs').innerHTML=d.vs;
  const btn=document.getElementById('mbtn');
  btn.textContent=mastered.has(key)?'✓ 習得済み！':'✓ 習得済みにする';
  btn.className='mbtn'+(mastered.has(key)?' done':'');
  document.getElementById('overlay').classList.add('open');
}
function cp(){document.getElementById('overlay').classList.remove('open');}
function cpbg(e){if(e.target===document.getElementById('overlay'))cp();}
function toggleM(){
  if(!currentKey)return;
  mastered.has(currentKey)?mastered.delete(currentKey):mastered.add(currentKey);
  saveM();
  const btn=document.getElementById('mbtn');
  btn.textContent=mastered.has(currentKey)?'✓ 習得済み！':'✓ 習得済みにする';
  btn.className='mbtn'+(mastered.has(currentKey)?' done':'');
  renderCards();
}

// INIT
renderConv();
renderCards();
</script>
</body>
</html>
